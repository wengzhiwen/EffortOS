{% extends "base.html" %}

{% block title %}活动记录 - EffortOS{% endblock %}

{% block content %}
<h2 class="page-header" style="margin-bottom: 1rem;">
    <span>活动记录</span>
    <div class="page-header-actions">
        <button class="btn btn-primary" style="font-size: 0.85rem;" onclick="openUploadModal()">上传文件</button>
        <a href="/compare" class="btn btn-secondary" style="font-size: 0.85rem;">对比</a>
        <button class="btn btn-secondary" style="font-size: 0.85rem;" onclick="exportData('csv')">导出</button>
    </div>
</h2>

<div class="confirm-overlay" id="upload-modal" style="display: none;">
    <div style="background: var(--card-bg); padding: 1.5rem; border-radius: 8px; max-width: 860px; width: 95%; box-shadow: 0 4px 20px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 style="margin: 0; font-size: 1.1rem;" id="upload-title">上传运动数据</h3>
            <button onclick="closeUploadModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); line-height: 1;">&times;</button>
        </div>

        <!-- Step 1: 选择文件 -->
        <div id="upload-step1">
            <input type="file" accept=".tcx,.gpx" multiple id="upload-file" style="display: none;">
            <div id="upload-dropzone" onclick="document.getElementById('upload-file').click()" style="border: 2px dashed var(--border); border-radius: 8px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;">
                <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
                <div style="font-weight: 600; margin-bottom: 0.25rem;">点击或拖拽文件到这里（支持多选）</div>
                <div style="color: var(--text-secondary); font-size: 0.85rem;">支持 TCX / GPX 格式</div>
            </div>
            <div id="upload-loading" style="display: none; text-align: center; padding: 2rem;">
                <div class="spinner" style="margin: 0 auto 0.75rem;"></div>
                <div id="upload-loading-text" style="color: var(--text-secondary);">正在分析文件...</div>
            </div>
        </div>

        <!-- Step 2: 批量确认列表 -->
        <div id="upload-step2" style="display: none;">
            <div id="upload-preview"></div>
            <div style="overflow-x: auto; margin-top: 0.75rem;">
                <table id="batch-table" style="font-size: 0.85rem; min-width: 600px;">
                    <thead>
                        <tr>
                            <th style="width:30px;"><input type="checkbox" id="batch-select-all" checked></th>
                            <th>文件名</th>
                            <th>时间</th>
                            <th>类型</th>
                            <th>名称</th>
                            <th>时长</th>
                            <th>距离</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="batch-tbody"></tbody>
                </table>
            </div>
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem;">
                <button class="btn btn-primary" id="batch-save-btn">保存</button>
                <button class="btn btn-secondary" onclick="resetUploadStep()">重新选择</button>
                <span id="upload-status" style="font-size: 0.85rem;"></span>
            </div>
        </div>
    </div>
</div>

<div class="card filter-card">
    <div class="filter-bar">
        <div class="filter-search-wrap">
            <input type="text" id="filter-search" placeholder="搜索活动名称..." onkeydown="if(event.key==='Enter')loadActivities(0)">
        </div>
        <div class="filter-sort-wrap">
            <select id="filter-sort" onchange="loadActivities(0)">
                <option value="-start_time">最新优先</option>
                <option value="start_time">最早优先</option>
                <option value="-created_at">最近上传</option>
                <option value="name">名称 A-Z</option>
            </select>
        </div>
        <button class="btn btn-secondary btn-sm filter-toggle-btn" onclick="toggleFilterPanel()">
            <span class="filter-toggle-icon" id="filter-toggle-icon">&#9660;</span> 筛选
            <span class="filter-count" id="filter-count" style="display:none"></span>
        </button>
    </div>
    <div class="filter-panel" id="filter-panel">
        <div class="grid grid-4" style="align-items: end;">
            <div class="form-group" style="margin-bottom: 0;">
                <label>运动类型</label>
                <select id="filter-type">
                    <option value="">全部</option>
                    <option value="cycling">骑行</option>
                    <option value="indoor_cycling">室内骑行</option>
                    <option value="commute_cycling">通勤骑行</option>
                    <option value="running">跑步</option>
                    <option value="indoor_running">室内跑步</option>
                    <option value="walking">步行</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>起始日期</label>
                <input type="date" id="filter-start">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>结束日期</label>
                <input type="date" id="filter-end">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>强度等级</label>
                <select id="filter-intensity">
                    <option value="">全部</option>
                    <option value="recovery">恢复</option>
                    <option value="endurance">有氧耐力</option>
                    <option value="tempo">节奏</option>
                    <option value="threshold">阈值</option>
                    <option value="vo2max">VO2max</option>
                </select>
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
            <button class="btn btn-primary btn-sm" onclick="loadActivities(0)">应用</button>
            <button class="btn btn-secondary btn-sm" onclick="clearFilters()">重置</button>
        </div>
    </div>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
        <div>
            <label style="font-size: 0.85rem; cursor: pointer;">
                <input type="checkbox" id="select-all"> 全选
            </label>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-secondary btn-sm" id="batch-delete-btn" style="display: none;" onclick="batchDelete()">删除选中</button>
        </div>
    </div>
    <div style="overflow-x: auto;">
    <table>
        <thead>
            <tr>
                <th style="width:30px;"></th>
                <th style="white-space:nowrap;">日期</th>
                <th>类型</th>
                <th>名称</th>
                <th style="white-space:nowrap;">时长</th>
                <th style="white-space:nowrap;">距离</th>
                <th>TSS</th>
                <th>hrTSS</th>
                <th>强度</th>
                <th style="width:40px;"></th>
            </tr>
        </thead>
        <tbody id="activity-list">
            <tr><td colspan="10">
                <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
                <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
                <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            </td></tr>
        </tbody>
    </table>
    </div>
    <div id="pagination" style="margin-top: 1rem; text-align: center;"></div>
</div>
{% endblock %}

{% block script %}
<script>
let currentOffset = 0;
const limit = 20;
const typeNames = window.TYPE_NAMES;
const intensityNames = { recovery: '恢复', endurance: '有氧耐力', tempo: '节奏', threshold: '阈值', vo2max: 'VO2max' };
const intensityColors = { recovery: '#60a5fa', endurance: '#34d399', tempo: '#fbbf24', threshold: '#f97316', vo2max: '#ef4444' };

function formatWindow(w) {
    return fmtDur(parseInt(w));
}

// ============ 批量上传逻辑 ============
let batchData = null;
let batchSessionId = null;

const dropzone = document.getElementById('upload-dropzone');
const fileInput = document.getElementById('upload-file');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor = 'var(--primary)'; dropzone.style.background = 'var(--primary-light)'; });
dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = 'var(--border)'; dropzone.style.background = ''; });
dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.style.borderColor = 'var(--border)';
    dropzone.style.background = '';
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
    }
});

fileInput.addEventListener('change', function() {
    const files = this.files;
    if (!files || files.length === 0) return;
    document.getElementById('upload-step1').style.display = 'none';
    document.getElementById('upload-loading').style.display = 'block';
    document.getElementById('upload-loading-text').textContent = `正在分析 ${files.length} 个文件...`;

    const formData = new FormData();
    for (let i = 0; i < files.length; i++) {
        formData.append('files', files[i]);
    }

    authFetch('/api/activities/batch-analyze', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(res => {
            if (res.code !== 200) {
                document.getElementById('upload-loading').style.display = 'none';
                document.getElementById('upload-step1').style.display = 'block';
                showToast(res.message || '分析失败', 'error');
                return;
            }
            batchData = res.data;
            batchSessionId = res.data.session_id;
            renderBatchTable(res.data.items);
            document.getElementById('upload-loading').style.display = 'none';
            document.getElementById('upload-step2').style.display = 'block';
            document.getElementById('upload-title').textContent = `分析完成（${res.data.items.length} 个文件）`;
            updateBatchSaveBtn();
        })
        .catch(() => {
            document.getElementById('upload-loading').style.display = 'none';
            document.getElementById('upload-step1').style.display = 'block';
            showToast('分析失败，请重试', 'error');
        });
});

function renderBatchTable(items) {
    const tbody = document.getElementById('batch-tbody');
    const typeOptions = Object.entries(typeNames).map(([k, v]) =>
        `<option value="${k}">${v}</option>`
    ).join('');

    let html = '';
    items.forEach((item, idx) => {
        const hasError = !!item.error;
        const isDup = !!item.is_duplicate;
        const rowStyle = (hasError || isDup) ? 'style="opacity:0.5"' : '';
        const statusText = hasError ? `<span style="color:var(--danger)">${esc(item.error)}</span>`
                         : isDup ? '<span style="color:var(--warning)">重复</span>'
                         : '正常';
        const checkAttr = (hasError || isDup) ? 'disabled' : 'checked';
        const timeStr = item.start_time ? item.start_time.slice(0, 16).replace('T', ' ') : '—';
        const durationStr = item.duration_seconds ? fmtDur(item.duration_seconds) : '—';
        const distStr = item.total_distance ? (item.total_distance / 1000).toFixed(1) + ' km' : '—';
        const selectedType = item.sport || 'other';

        html += `<tr ${rowStyle}>
            <td><input type="checkbox" class="batch-check" data-idx="${idx}" ${checkAttr}></td>
            <td title="${esc(item.filename)}" style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(item.filename)}</td>
            <td style="white-space:nowrap;">${timeStr}</td>
            <td><select class="batch-type" data-idx="${idx}" style="font-size:0.8rem;padding:2px 4px;">${typeOptions.replace(`value="${selectedType}"`, `value="${selectedType}" selected`)}</select></td>
            <td><input type="text" class="batch-name" data-idx="${idx}" value="${esc(item.name_suggestion)}" style="font-size:0.8rem;padding:2px 4px;width:120px;"></td>
            <td style="white-space:nowrap;">${durationStr}</td>
            <td>${distStr}</td>
            <td>${statusText}</td>
        </tr>`;
    });
    tbody.innerHTML = html;

    document.querySelectorAll('.batch-check').forEach(cb => {
        cb.addEventListener('change', updateBatchSaveBtn);
    });
}

function updateBatchSaveBtn() {
    const checked = document.querySelectorAll('.batch-check:checked');
    const btn = document.getElementById('batch-save-btn');
    btn.textContent = checked.length > 0 ? `保存 ${checked.length} 条活动` : '保存';
}

document.getElementById('batch-select-all').addEventListener('change', function() {
    document.querySelectorAll('.batch-check:not(:disabled)').forEach(cb => cb.checked = this.checked);
    updateBatchSaveBtn();
});

document.getElementById('batch-save-btn').addEventListener('click', function() {
    const checked = document.querySelectorAll('.batch-check:checked');
    if (checked.length === 0) { showToast('请至少选择一个文件', 'error'); return; }

    const items = [];
    checked.forEach(cb => {
        const idx = parseInt(cb.dataset.idx);
        const item = batchData.items[idx];
        items.push({
            temp_id: item.temp_id,
            filename: item.filename,
            activity_type: document.querySelector(`.batch-type[data-idx="${idx}"]`).value,
            name: document.querySelector(`.batch-name[data-idx="${idx}"]`).value,
        });
    });

    const btn = this;
    const status = document.getElementById('upload-status');
    btn.disabled = true;
    btn.textContent = '保存中...';
    status.textContent = '';

    authFetch('/api/activities/batch-upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: batchSessionId, items: items }),
    })
        .then(r => r.json())
        .then(res => {
            btn.disabled = false;
            updateBatchSaveBtn();
            if (res.code === 200) {
                const failed = res.data.errors.length;
                showToast(res.message, failed > 0 ? 'info' : 'success');
                closeUploadModal();
                loadActivities(0);
            } else {
                status.textContent = res.message;
                status.style.color = 'var(--danger)';
            }
        })
        .catch(() => {
            btn.disabled = false;
            updateBatchSaveBtn();
            showToast('保存失败，请重试', 'error');
        });
});

function resetUploadStep() {
    document.getElementById('upload-step2').style.display = 'none';
    document.getElementById('upload-step1').style.display = 'block';
    document.getElementById('upload-title').textContent = '上传运动数据';
    fileInput.value = '';
    document.getElementById('upload-status').textContent = '';
    batchData = null;
    batchSessionId = null;
}

// ============ 弹层开关 ============
function openUploadModal() {
    document.getElementById('upload-modal').style.display = 'flex';
    resetUploadStep();
}
function closeUploadModal() {
    document.getElementById('upload-modal').style.display = 'none';
    fileInput.value = '';
}
document.getElementById('upload-modal').addEventListener('click', e => {
    if (e.target.id === 'upload-modal') closeUploadModal();
});

// ============ 筛选面板 ============
let filterPanelOpen = false;

function toggleFilterPanel() {
    filterPanelOpen = !filterPanelOpen;
    const panel = document.getElementById('filter-panel');
    const icon = document.getElementById('filter-toggle-icon');
    panel.style.display = filterPanelOpen ? 'block' : 'none';
    icon.innerHTML = filterPanelOpen ? '&#9650;' : '&#9660;';
}

function updateFilterCount() {
    const type = document.getElementById('filter-type').value;
    const start = document.getElementById('filter-start').value;
    const end = document.getElementById('filter-end').value;
    const intensity = document.getElementById('filter-intensity').value;
    const search = document.getElementById('filter-search').value.trim();
    let count = 0;
    if (type) count++;
    if (start) count++;
    if (end) count++;
    if (intensity) count++;
    if (search) count++;
    const badge = document.getElementById('filter-count');
    if (count > 0) {
        badge.style.display = 'inline-block';
        badge.textContent = count;
    } else {
        badge.style.display = 'none';
    }
}

// ============ 活动列表 ============
function getFilterParams() {
    const params = new URLSearchParams();
    const type = document.getElementById('filter-type').value;
    const start = document.getElementById('filter-start').value;
    const end = document.getElementById('filter-end').value;
    const intensity = document.getElementById('filter-intensity').value;
    const search = document.getElementById('filter-search').value.trim();
    if (type) params.set('activity_type', type);
    if (start) params.set('start_date', start);
    if (end) params.set('end_date', end);
    if (intensity) params.set('intensity_level', intensity);
    if (search) params.set('search', search);
    const sort = document.getElementById('filter-sort').value;
    if (sort && sort !== '-start_time') params.set('sort', sort);
    return params.toString();
}

function loadActivities(offset = 0) {
    currentOffset = offset;
    updateFilterCount();
    const filters = getFilterParams();
    const url = `/api/activities?limit=${limit}&offset=${offset}${filters ? '&' + filters : ''}`;
    authFetch(url)
        .then(r => r.json())
        .then(res => {
            const tbody = document.getElementById('activity-list');
            const items = res.data.items;
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10">暂无活动记录</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(a => {
                const s = a.data_summary || {};
                const m = a.computed_metrics || {};
                const duration = fmtDur(s.duration_seconds);
                const dist = s.total_distance ? (s.total_distance / 1000).toFixed(1) + ' km' : '—';
                const displayTss = m.manual_tss != null ? m.manual_tss : m.tss;
                const tss = displayTss != null ? displayTss.toFixed(1) : '—';
                const tssTag = m.manual_tss != null ? ' <span style="font-size:0.7rem;color:var(--text-secondary)">手动</span>' : '';
                const hrTss = m.hr_tss != null ? m.hr_tss.toFixed(1) : '—';
                const il = m.intensity_level;
                const intensityBadge = il ? `<span style="color: ${intensityColors[il] || '#999'}; font-weight: 600;">${intensityNames[il] || il}</span>` : '—';
                const pbWindows = a.pb_windows || [];
                const pbBadge = pbWindows.length > 0 ? ` <span style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-size: 0.7rem; padding: 1px 5px; border-radius: 3px; font-weight: 700; vertical-align: middle;" title="刷新 PB: ${pbWindows.map(w => formatWindow(w)).join(', ')}">PB</span>` : '';
                return `<tr>
                    <td><input type="checkbox" class="activity-check" data-id="${a.id}"></td>
                    <td><span title="${a.start_time}">${a.start_time.slice(0, 10)}</span><span style="color: var(--text-secondary); font-size: 0.75rem; margin-left: 4px;">${'日一二三四五六'[new Date(a.start_time).getDay()]}</span></td>
                    <td><span class="badge badge-${a.activity_type}">${typeNames[a.activity_type] || a.activity_type}</span></td>
                    <td><a href="/activities/${a.id}">${esc(a.name || '—')}</a>${pbBadge}</td>
                    <td>${duration}</td>
                    <td>${dist}</td>
                    <td>${tss}${tssTag}</td>
                    <td>${hrTss}</td>
                    <td>${intensityBadge}</td>
                    <td><button onclick="deleteActivity('${a.id}')" style="color: var(--danger); background: none; border: none; cursor: pointer;">删除</button></td>
                </tr>`;
            }).join('');

            const total = res.data.total;
            const pag = document.getElementById('pagination');
            let html = `<span style="color: var(--text-secondary); font-size: 0.85rem; margin-right: 1rem;">共 ${total} 条</span>`;
            if (total > limit) {
                const pages = Math.ceil(total / limit);
                const current = Math.floor(offset / limit);
                for (let i = 0; i < pages; i++) {
                    html += `<a href="#" onclick="loadActivities(${i * limit}); return false;" class="btn btn-sm" style="${i === current ? 'background: var(--primary); color: white;' : ''}">${i + 1}</a> `;
                }
            }
            pag.innerHTML = html;
        });
}

function clearFilters() {
    document.getElementById('filter-type').value = '';
    document.getElementById('filter-start').value = '';
    document.getElementById('filter-end').value = '';
    document.getElementById('filter-intensity').value = '';
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-sort').value = '-start_time';
    updateFilterCount();
    loadActivities(0);
}

function exportData(format) {
    const filters = getFilterParams();
    const url = `/api/activities/export?format=${format}${filters ? '&' + filters : ''}`;
    if (format === 'json') {
        authFetch(url)
            .then(r => r.json())
            .then(res => {
                const blob = new Blob([JSON.stringify(res.data, null, 2)],{type:'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'activities.json';
                a.click();
                showToast('JSON 导出成功', 'success');
            });
    } else {
        authFetch(url)
            .then(r => r.blob())
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'activities.csv';
                a.click();
                showToast('CSV 导出成功', 'success');
            });
    }
}

async function deleteActivity(id) {
    if (!await confirmDialog('确定删除此活动？')) return;
    authFetch(`/api/activities/${id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) showToast('已删除', 'success');
            loadActivities(currentOffset);
        });
}

// 全选/取消全选
document.getElementById('select-all').addEventListener('change', function() {
    document.querySelectorAll('.activity-check').forEach(cb => cb.checked = this.checked);
    updateBatchBtn();
});
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('activity-check')) updateBatchBtn();
});

function updateBatchBtn() {
    const checked = document.querySelectorAll('.activity-check:checked');
    const show = checked.length > 0;
    document.getElementById('batch-delete-btn').style.display = show ? 'inline-block' : 'none';
    document.getElementById('batch-delete-btn').textContent = `删除选中 (${checked.length})`;
}

async function batchDelete() {
    const ids = Array.from(document.querySelectorAll('.activity-check:checked')).map(cb => cb.dataset.id);
    if (ids.length === 0) return;
    if (!await confirmDialog(`确定删除 ${ids.length} 条活动？`)) return;
    authFetch('/api/activities/batch-delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) { showToast(`已删除 ${ids.length} 条`, 'success'); loadActivities(0); }
            else showToast(res.message, 'error');
        });
}

loadActivities(0);
</script>
{% endblock %}
