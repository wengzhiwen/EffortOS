{% extends "base.html" %}

{% block title %}活动记录 - EffortOS{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1rem;">
    活动记录
    <div style="float: right; display: flex; gap: 0.5rem;">
        <a href="/compare" class="btn btn-secondary" style="font-size: 0.85rem;">对比</a>
        <a href="#upload" class="btn btn-primary" style="font-size: 0.85rem;">上传文件</a>
    </div>
</h2>

<div class="card" id="upload" style="display: none;">
    <div class="card-title">上传运动数据</div>
    <form id="upload-form" enctype="multipart/form-data">
        <div class="grid grid-3">
            <div class="form-group">
                <label>运动类型</label>
                <select name="activity_type" required id="upload-type">
                    <option value="cycling">骑行</option>
                    <option value="indoor_cycling">室内骑行</option>
                    <option value="running">跑步</option>
                    <option value="indoor_running">室内跑步</option>
                    <option value="walking">步行</option>
                </select>
            </div>
            <div class="form-group">
                <label>名称（可选）</label>
                <input type="text" name="name" id="upload-name" placeholder="选择文件后自动生成">
            </div>
            <div class="form-group">
                <label>文件（TCX/GPX）</label>
                <input type="file" name="file" accept=".tcx,.gpx" required id="upload-file">
            </div>
        </div>
        <div id="upload-preview" style="display: none; margin-bottom: 1rem;"></div>
        <button type="submit" class="btn btn-primary" id="upload-btn">上传</button>
    </form>
    <div id="upload-status" style="margin-top: 0.5rem;"></div>
</div>

<div class="card">
    <div class="card-title">筛选</div>
    <div style="display: flex; gap: 0.5rem; align-items: end; flex-wrap: wrap; margin-bottom: 0.5rem;">
        <div class="form-group" style="margin-bottom: 0;">
            <input type="text" id="filter-search" placeholder="搜索活动名称..." style="max-width: 300px;" onkeydown="if(event.key==='Enter')loadActivities(0)">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>排序</label>
            <select id="filter-sort" onchange="loadActivities(0)">
                <option value="-start_time">最新优先</option>
                <option value="start_time">最早优先</option>
                <option value="-created_at">最近上传</option>
                <option value="name">名称 A-Z</option>
            </select>
        </div>
    </div>
    <div class="grid grid-4" style="align-items: end;">
        <div class="form-group" style="margin-bottom: 0;">
            <label>运动类型</label>
            <select id="filter-type">
                <option value="">全部</option>
                <option value="cycling">骑行</option>
                <option value="indoor_cycling">室内骑行</option>
                <option value="running">跑步</option>
                <option value="indoor_running">室内跑步</option>
                <option value="walking">步行</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>起始日期</label>
            <input type="date" id="filter-start">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>结束日期</label>
            <input type="date" id="filter-end">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
            <label>强度等级</label>
            <select id="filter-intensity">
                <option value="">全部</option>
                <option value="recovery">恢复</option>
                <option value="endurance">有氧耐力</option>
                <option value="tempo">节奏</option>
                <option value="threshold">阈值</option>
                <option value="vo2max">VO2max</option>
            </select>
        </div>
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;" class="filter-buttons">
        <button class="btn btn-primary" onclick="loadActivities(0)">筛选</button>
        <button class="btn btn-secondary" onclick="exportData('csv')">导出 CSV</button>
        <button class="btn btn-secondary" onclick="exportData('json')">导出 JSON</button>
    </div>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
        <div>
            <label style="font-size: 0.85rem; cursor: pointer;">
                <input type="checkbox" id="select-all"> 全选
            </label>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button class="btn btn-secondary btn-sm" id="batch-gear-btn" style="display: none;" onclick="batchGear()">分配装备</button>
            <button class="btn btn-secondary btn-sm" id="batch-delete-btn" style="display: none;" onclick="batchDelete()">删除选中</button>
        </div>
    </div>
    <div style="overflow-x: auto;">
    <table>
        <thead>
            <tr>
                <th></th>
                <th>日期</th>
                <th>类型</th>
                <th>名称</th>
                <th>时长</th>
                <th>距离</th>
                <th>平均心率</th>
                <th>TSS</th>
                <th>强度</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="activity-list">
            <tr><td colspan="10">
                <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
                <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
                <div class="skeleton-row"><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div><div class="skeleton skeleton-cell"></div></div>
            </td></tr>
        </tbody>
    </table>
    </div>
    <div id="pagination" style="margin-top: 1rem; text-align: center;"></div>
</div>
{% endblock %}

{% block script %}
<script>
let currentOffset = 0;
const limit = 20;
const typeNames = window.TYPE_NAMES;
const intensityNames = { recovery: '恢复', endurance: '有氧耐力', tempo: '节奏', threshold: '阈值', vo2max: 'VO2max' };
const intensityColors = { recovery: '#60a5fa', endurance: '#34d399', tempo: '#fbbf24', threshold: '#f97316', vo2max: '#ef4444' };

function formatWindow(w) {
    const s = parseInt(w);
    if (s < 60) return s + '秒';
    if (s < 3600) return (s / 60) + '分钟';
    return (s / 3600) + '小时';
}

// 文件选择后自动分析
document.getElementById('upload-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const preview = document.getElementById('upload-preview');
    preview.style.display = 'block';
    preview.innerHTML = '<div class="loading"><div class="spinner"></div>正在分析文件...</div>';

    const formData = new FormData();
    formData.append('file', file);

    authFetch('/api/activities/analyze', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(res => {
            if (res.code !== 200) {
                preview.textContent = res.message;
                preview.style.color = 'var(--danger)';
                preview.style.fontSize = '0.85rem';
                return;
            }
            const d = res.data;
            // 自动填充表单
            const typeSelect = document.getElementById('upload-type');
            const matchingOption = Array.from(typeSelect.options).find(o => o.value === d.sport);
            if (matchingOption) {
                typeSelect.value = d.sport;
            }
            document.getElementById('upload-name').value = d.name_suggestion;

            // 显示预览
            const durationStr = d.duration_seconds ? Math.floor(d.duration_seconds / 60) + '分钟' : '—';
            const distStr = d.total_distance ? (d.total_distance / 1000).toFixed(1) + ' km' : '—';
            let html = `<div style="padding: 0.75rem; background: var(--primary-light); border-radius: 6px; font-size: 0.85rem;">
                <div style="font-weight: 600; margin-bottom: 0.5rem;">文件分析结果</div>
                <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                    <span>类型: <strong>${d.sport_display}</strong></span>
                    <span>时长: ${durationStr}</span>
                    <span>距离: ${distStr}</span>
                    <span>数据点: ${d.trackpoint_count}</span>
                    <span>心率: ${d.has_heart_rate ? '✓' : '✗'}</span>
                    <span>功率: ${d.has_power ? '✓' : '✗'}</span>
                </div>`;
            if (d.warnings.length > 0) {
                html += `<div style="margin-top: 0.5rem; color: var(--warning);">
                    <strong>注意:</strong> ${d.warnings.join('；')}
                </div>`;
            }
            html += '</div>';
            preview.innerHTML = html;
        })
        .catch(() => {
            preview.innerHTML = '<div style="color: var(--text-secondary); font-size: 0.85rem;">分析失败，可直接上传。</div>';
        });
});

function getFilterParams() {
    const params = new URLSearchParams();
    const type = document.getElementById('filter-type').value;
    const start = document.getElementById('filter-start').value;
    const end = document.getElementById('filter-end').value;
    const intensity = document.getElementById('filter-intensity').value;
    const search = document.getElementById('filter-search').value.trim();
    if (type) params.set('activity_type', type);
    if (start) params.set('start_date', start);
    if (end) params.set('end_date', end);
    if (intensity) params.set('intensity_level', intensity);
    if (search) params.set('search', search);
    const sort = document.getElementById('filter-sort').value;
    if (sort && sort !== '-start_time') params.set('sort', sort);
    return params.toString();
}

function loadActivities(offset = 0) {
    currentOffset = offset;
    const filters = getFilterParams();
    const url = `/api/activities?limit=${limit}&offset=${offset}${filters ? '&' + filters : ''}`;
    authFetch(url)
        .then(r => r.json())
        .then(res => {
            const tbody = document.getElementById('activity-list');
            const items = res.data.items;
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10">暂无活动记录</td></tr>';
                return;
            }
            tbody.innerHTML = items.map(a => {
                const s = a.data_summary || {};
                const m = a.computed_metrics || {};
                const duration = s.duration_seconds ? Math.floor(s.duration_seconds / 60) + '分' : '—';
                const dist = s.total_distance ? (s.total_distance / 1000).toFixed(1) + ' km' : '—';
                const hr = s.avg_heart_rate || '—';
                const tss = m.tss != null ? m.tss.toFixed(1) : '—';
                const il = m.intensity_level;
                const intensityBadge = il ? `<span style="color: ${intensityColors[il] || '#999'}; font-weight: 600;">${intensityNames[il] || il}</span>` : '—';
                const pbWindows = a.pb_windows || [];
                const pbBadge = pbWindows.length > 0 ? ` <span style="background: linear-gradient(135deg, #f59e0b, #d97706); color: white; font-size: 0.7rem; padding: 1px 5px; border-radius: 3px; font-weight: 700; vertical-align: middle;" title="刷新 PB: ${pbWindows.map(w => formatWindow(w)).join(', ')}">PB</span>` : '';
                return `<tr>
                    <td><input type="checkbox" class="activity-check" data-id="${a.id}"></td>
                    <td><span title="${a.start_time}">${a.start_time.slice(0, 10)}</span><span style="color: var(--text-secondary); font-size: 0.75rem; margin-left: 4px;">${'日一二三四五六'[new Date(a.start_time).getDay()]}</span></td>
                    <td><span class="badge badge-${a.activity_type}">${typeNames[a.activity_type] || a.activity_type}</span></td>
                    <td><a href="/activities/${a.id}">${esc(a.name || '—')}</a>${pbBadge}</td>
                    <td>${duration}</td>
                    <td>${dist}</td>
                    <td>${hr}</td>
                    <td>${tss}</td>
                    <td>${intensityBadge}</td>
                    <td><button onclick="deleteActivity('${a.id}')" style="color: var(--danger); background: none; border: none; cursor: pointer;">删除</button></td>
                </tr>`;
            }).join('');

            const total = res.data.total;
            const pag = document.getElementById('pagination');
            let html = `<span style="color: var(--text-secondary); font-size: 0.85rem; margin-right: 1rem;">共 ${total} 条</span>`;
            if (total > limit) {
                const pages = Math.ceil(total / limit);
                const current = Math.floor(offset / limit);
                for (let i = 0; i < pages; i++) {
                    html += `<a href="#" onclick="loadActivities(${i * limit}); return false;" class="btn btn-sm" style="${i === current ? 'background: var(--primary); color: white;' : ''}">${i + 1}</a> `;
                }
            }
            pag.innerHTML = html;
        });
}

function clearFilters() {
    document.getElementById('filter-type').value = '';
    document.getElementById('filter-start').value = '';
    document.getElementById('filter-end').value = '';
    document.getElementById('filter-intensity').value = '';
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-sort').value = '-start_time';
    loadActivities(0);
}

function exportData(format) {
    const filters = getFilterParams();
    const url = `/api/activities/export?format=${format}${filters ? '&' + filters : ''}`;
    if (format === 'json') {
        authFetch(url)
            .then(r => r.json())
            .then(res => {
                const blob = new Blob([JSON.stringify(res.data, null, 2)], {type: 'application/json'});
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'activities.json';
                a.click();
                showToast('JSON 导出成功', 'success');
            });
    } else {
        authFetch(url)
            .then(r => r.blob())
            .then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'activities.csv';
                a.click();
                showToast('CSV 导出成功', 'success');
            });
    }
}

async function deleteActivity(id) {
    if (!await confirmDialog('确定删除此活动？')) return;
    authFetch(`/api/activities/${id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) showToast('已删除', 'success');
            loadActivities(currentOffset);
        });
}

// 上传表单
const uploadSection = document.querySelector('#upload');
document.querySelector('a[href="#upload"]').addEventListener('click', e => {
    e.preventDefault();
    uploadSection.style.display = uploadSection.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('upload-form').addEventListener('submit', e => {
    e.preventDefault();
    const status = document.getElementById('upload-status');
    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    btn.textContent = '上传中...';
    status.textContent = '';
    const formData = new FormData(e.target);
    authFetch('/api/activities/upload', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(res => {
            btn.disabled = false;
            btn.textContent = '上传';
            if (res.code === 200) {
                status.textContent = '上传成功！';
                status.style.color = 'var(--success)';
                e.target.reset();
                document.getElementById('upload-preview').style.display = 'none';
                loadActivities(0);
            } else {
                status.textContent = res.message;
                status.style.color = 'var(--danger)';
            }
        })
        .catch(() => {
            btn.disabled = false;
            btn.textContent = '上传';
        });
});

// 全选/取消全选
document.getElementById('select-all').addEventListener('change', function() {
    document.querySelectorAll('.activity-check').forEach(cb => cb.checked = this.checked);
    updateBatchBtn();
});
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('activity-check')) updateBatchBtn();
});

function updateBatchBtn() {
    const checked = document.querySelectorAll('.activity-check:checked');
    const show = checked.length > 0;
    document.getElementById('batch-delete-btn').style.display = show ? 'inline-block' : 'none';
    document.getElementById('batch-gear-btn').style.display = show ? 'inline-block' : 'none';
    document.getElementById('batch-delete-btn').textContent = `删除选中 (${checked.length})`;
}

async function batchDelete() {
    const ids = Array.from(document.querySelectorAll('.activity-check:checked')).map(cb => cb.dataset.id);
    if (ids.length === 0) return;
    if (!await confirmDialog(`确定删除 ${ids.length} 条活动？`)) return;
    authFetch('/api/activities/batch-delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) { showToast(`已删除 ${ids.length} 条`, 'success'); loadActivities(0); }
            else showToast(res.message, 'error');
        });
}

async function batchGear() {
    const ids = Array.from(document.querySelectorAll('.activity-check:checked')).map(cb => cb.dataset.id);
    if (ids.length === 0) return;
    const gearRes = await authFetch('/api/gear').then(r => r.json());
    const gears = (gearRes.data || []).filter(g => g.is_active !== 'retired');
    if (gears.length === 0) { showToast('暂无可用装备，请先添加', 'error'); return; }

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;';
    const box = document.createElement('div');
    box.style.cssText = 'background:var(--card-bg);padding:1.5rem;border-radius:8px;max-width:400px;width:90%;border:1px solid var(--border);';
    const h3 = document.createElement('h3');
    h3.textContent = `为 ${ids.length} 条活动分配装备`;
    h3.style.marginBottom = '1rem';
    const select = document.createElement('select');
    select.style.cssText = 'width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;margin-bottom:1rem;';
    const optNone = document.createElement('option');
    optNone.value = '';
    optNone.textContent = '— 清除装备 —';
    select.appendChild(optNone);
    gears.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        select.appendChild(opt);
    });
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:0.5rem;';
    const btnOk = document.createElement('button');
    btnOk.className = 'btn btn-primary';
    btnOk.textContent = '确定';
    const btnCancel = document.createElement('button');
    btnCancel.className = 'btn btn-secondary';
    btnCancel.textContent = '取消';
    btnRow.appendChild(btnOk);
    btnRow.appendChild(btnCancel);
    box.appendChild(h3);
    box.appendChild(select);
    box.appendChild(btnRow);
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    btnCancel.addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    btnOk.addEventListener('click', () => {
        const gearId = select.value;
        btnOk.disabled = true;
        authFetch('/api/activities/batch-gear', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids, gear_id: gearId || null }),
        })
            .then(r => r.json())
            .then(res => {
                overlay.remove();
                if (res.code === 200) { showToast(res.message, 'success'); loadActivities(0); }
                else showToast(res.message, 'error');
            });
    });
}

loadActivities(0);
</script>
{% endblock %}
