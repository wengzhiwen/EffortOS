{% extends "base.html" %}

{% block title %}{{ t('gear.title') }} - EffortOS{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1rem;">
    {{ t('gear.title') }}
    <button class="btn btn-primary" style="float: right; font-size: 0.85rem;" onclick="showAddForm()">{{ t('gear.add_gear') }}</button>
</h2>

<div id="add-form" class="card" style="display: none; margin-bottom: 1rem;">
    <div class="card-title" id="form-title">{{ t('gear.add_gear') }}</div>
    <div class="grid grid-4" style="align-items: end;">
        <div class="form-group">
            <label>{{ t('gear.name_label') }}</label>
            <input type="text" id="gear-name" placeholder="{{ t('gear.name_placeholder') }}" required>
        </div>
        <div class="form-group">
            <label>{{ t('gear.type_label') }}</label>
            <select id="gear-type">
                <option value="bike">{{ t('gear.type_bike') }}</option>
                <option value="shoes">{{ t('gear.type_shoes') }}</option>
                <option value="wetsuit">{{ t('gear.type_wetsuit') }}</option>
                <option value="other">{{ t('gear.type_other') }}</option>
            </select>
        </div>
        <div class="form-group">
            <label>{{ t('gear.lifetime_km') }}</label>
            <input type="number" id="gear-limit" placeholder="{{ t('gear.limit_placeholder') }}">
        </div>
        <div class="form-group">
            <label>{{ t('gear.purchase_date') }}</label>
            <input type="date" id="gear-purchase-date">
        </div>
    </div>
    <div class="form-group">
        <label>{{ t('gear.notes_label') }}</label>
        <input type="text" id="gear-notes" placeholder="{{ t('gear.notes_placeholder') }}">
    </div>
    <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
        <button class="btn btn-primary" onclick="saveGear()">{{ t('gear.save') }}</button>
        <button class="btn btn-secondary" onclick="hideForm()">{{ t('gear.cancel') }}</button>
    </div>
</div>

<div id="gear-list"><div class="loading"><div class="spinner"></div>{{ t('gear.loading') }}</div></div>

<div id="retired-section" style="display: none; margin-top: 2rem;">
    <h3 style="margin-bottom: 0.75rem; color: var(--text-secondary);">{{ t('gear.retired_section') }}</h3>
    <div id="retired-list"></div>
</div>
{% endblock %}

{% block script %}
<script>
const typeIcons = { bike: '🚴', shoes: '👟', wetsuit: '🏊', other: '📦' };
let editingId = null;

function loadGear() {
    authFetch('/api/gear')
        .then(r => r.json())
        .then(res => {
            const items = res.data || [];
            const active = items.filter(g => g.is_active !== 'retired');
            const retired = items.filter(g => g.is_active === 'retired');

            const container = document.getElementById('gear-list');
            if (active.length === 0) {
                container.innerHTML = `<div class="card" style="text-align: center; color: var(--text-secondary); padding: 2rem;">${t('gear.no_gear')}</div>`;
            } else {
                container.innerHTML = active.map(g => gearCard(g)).join('');
            }

            const retiredSection = document.getElementById('retired-section');
            const retiredList = document.getElementById('retired-list');
            if (retired.length > 0) {
                retiredSection.style.display = 'block';
                retiredList.innerHTML = retired.map(g => gearCard(g)).join('');
            } else {
                retiredSection.style.display = 'none';
            }
        });
}

function gearCard(g) {
    const wearBar = g.wear_percent != null ? `
        <div style="margin-top: 0.5rem;">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary);">
                <span>${g.total_distance_km} km</span>
                <span>${g.wear_percent}% / ${g.distance_limit_km} km</span>
            </div>
            <div style="background: var(--border); border-radius: 4px; height: 6px; margin-top: 0.25rem; overflow: hidden;">
                <div style="height: 100%; width: ${Math.min(g.wear_percent, 100)}%; background: ${g.needs_replacement ? 'var(--danger)' : g.wear_percent > 80 ? '#f59e0b' : 'var(--primary)'}; border-radius: 4px; transition: width 0.3s;"></div>
            </div>
            ${g.needs_replacement ? `<div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;">${t('gear.over_limit')}</div>` : ''}
        </div>
    ` : `<div style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem;">${t('gear.total_distance')} ${g.total_distance_km} km</div>`;

    return `<div class="card" style="margin-bottom: 0.75rem;">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <div style="font-weight: 600; font-size: 1.05rem;">${typeIcons[g.gear_type] || ''} ${esc(g.name)}</div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">${g.gear_type_name}${g.purchase_date ? ' · ' + t('gear.purchased') + ' ' + g.purchase_date : ''}</div>
                ${g.notes ? `<div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">${esc(g.notes)}</div>` : ''}
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-secondary btn-sm" onclick="editGear('${g.id}')">${t('gear.edit')}</button>
                ${g.is_active !== 'retired' ? `<button class="btn btn-secondary btn-sm" onclick="retireGear('${g.id}')">${t('gear.retire')}</button>` : ''}
            </div>
        </div>
        ${wearBar}
    </div>`;
}

function showAddForm() {
    editingId = null;
    document.getElementById('form-title').textContent = t('gear.add_gear');
    document.getElementById('gear-name').value = '';
    document.getElementById('gear-type').value = 'bike';
    document.getElementById('gear-limit').value = '';
    document.getElementById('gear-purchase-date').value = '';
    document.getElementById('gear-notes').value = '';
    document.getElementById('add-form').style.display = 'block';
}

function hideForm() {
    document.getElementById('add-form').style.display = 'none';
    editingId = null;
}

function editGear(id) {
    authFetch('/api/gear')
        .then(r => r.json())
        .then(res => {
            const g = res.data.find(g => g.id === id);
            if (!g) return;
            editingId = id;
            document.getElementById('form-title').textContent = t('gear.edit_gear');
            document.getElementById('gear-name').value = g.name;
            document.getElementById('gear-type').value = g.gear_type;
            document.getElementById('gear-limit').value = g.distance_limit_km || '';
            document.getElementById('gear-purchase-date').value = g.purchase_date || '';
            document.getElementById('gear-notes').value = g.notes || '';
            document.getElementById('add-form').style.display = 'block';
        });
}

function saveGear() {
    const data = {
        name: document.getElementById('gear-name').value,
        gear_type: document.getElementById('gear-type').value,
        distance_limit_km: document.getElementById('gear-limit').value ? parseFloat(document.getElementById('gear-limit').value) : null,
        purchase_date: document.getElementById('gear-purchase-date').value || null,
        notes: document.getElementById('gear-notes').value,
    };

    if (!data.name) { showToast(t('gear.name_required'), 'error'); return; }

    const url = editingId ? `/api/gear/${editingId}` : '/api/gear';
    const method = editingId ? 'PUT' : 'POST';

    authFetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) {
                showToast(editingId ? t('gear.updated') : t('gear.added'), 'success');
                hideForm();
                loadGear();
            } else {
                showToast(res.message, 'error');
            }
        });
}

async function retireGear(id) {
    if (!await confirmDialog(t('gear.confirm_retire'))) return;
    authFetch(`/api/gear/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ is_active: 'retired' }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) { showToast(t('gear.retired'), 'success'); loadGear(); }
        });
}

loadGear();
</script>
{% endblock %}
