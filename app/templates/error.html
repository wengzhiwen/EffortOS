{% extends "base.html" %}

{% block title %}{{ code }} - EffortOS{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 1rem;">
    <div style="font-size: 4rem; font-weight: 700; color: var(--primary);">{{ code }}</div>
    <p style="font-size: 1.1rem; color: var(--text-secondary); margin: 1rem 0;">{{ message }}</p>
    <a href="/" class="btn btn-primary">返回首页</a>
</div>
{% endblock %}
