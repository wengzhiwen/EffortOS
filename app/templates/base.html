<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EffortOS{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}EffortOS — 运动数据追踪与分析平台，上传 TCX/GPX 文件，智能计算训练指标并提供个性化建议。{% endblock %}">
    <meta property="og:title" content="{% block og_title %}EffortOS{% endblock %}">
    <meta property="og:description" content="{% block og_description %}运动数据追踪与分析平台{% endblock %}">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 2000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 0.75rem 1rem; border-radius: 6px; color: white; font-size: 0.9rem; opacity: 0; transform: translateX(100%); transition: all 0.3s; max-width: 360px; }
    .toast.show { opacity: 1; transform: translateX(0); }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-info { background: var(--primary); }
    .confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; display: flex; align-items: center; justify-content: center; }
    .confirm-box { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; max-width: 400px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .confirm-box p { margin-bottom: 1.25rem; line-height: 1.6; }
    .confirm-box .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
    </style>
    <script>
    // 全局常量和工具
    window.TYPE_NAMES = { cycling: '骑行', indoor_cycling: '室内骑行', running: '跑步', indoor_running: '室内跑步', walking: '步行', swimming: '游泳', other: '其他' };
    </script>
    <script>
    // 全局认证工具（必须在子模板 script 之前加载）
    (function() {
        function getToken() {
            return localStorage.getItem('token');
        }
        function getUser() {
            const u = localStorage.getItem('user');
            return u ? JSON.parse(u) : null;
        }
        window.authFetch = function(url, options) {
            options = options || {};
            const token = getToken();
            if (token) {
                options.headers = options.headers || {};
                if (options.headers instanceof Headers) {
                    options.headers.set('Authorization', 'Bearer ' + token);
                } else {
                    options.headers['Authorization'] = 'Bearer ' + token;
                }
            }
            return fetch(url, options).then(function(resp) {
                if (resp.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname);
                    return Promise.reject(new Error('未登录'));
                }
                return resp;
            });
        };
        // 页面加载后更新导航栏
        document.addEventListener('DOMContentLoaded', function() {
            var user = getUser();
            var token = getToken();
            var userInfo = document.getElementById('user-info');
            var userNickname = document.getElementById('user-nickname');
            var btnLogin = document.getElementById('btn-login');
            if (user && token) {
                if (userInfo) userInfo.style.display = 'inline-flex';
                if (userNickname) userNickname.textContent = user.nickname || user.email;
                if (btnLogin) btnLogin.style.display = 'none';
            } else {
                if (userInfo) userInfo.style.display = 'none';
                if (btnLogin) btnLogin.style.display = 'inline-block';
            }
            var btnLogout = document.getElementById('btn-logout');
            if (btnLogout) {
                btnLogout.addEventListener('click', async function() {
                    var t = getToken();
                    await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: t ? {'Authorization': 'Bearer ' + t} : {},
                    });
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/login';
                });
            }
            // 移动端汉堡菜单切换
            var hamburger = document.getElementById('hamburger');
            var navLinks = document.getElementById('nav-links');
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    navLinks.classList.toggle('nav-open');
                    hamburger.classList.toggle('hamburger-open');
                });
                // 点击导航链接后自动关闭菜单
                navLinks.querySelectorAll('a').forEach(function(link) {
                    link.addEventListener('click', function() {
                        navLinks.classList.remove('nav-open');
                        hamburger.classList.remove('hamburger-open');
                    });
                });
            }
            // 主题切换
            var themeBtn = document.getElementById('theme-toggle');
            var savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
                if (themeBtn) themeBtn.textContent = '☀️';
            }
            if (themeBtn) {
                themeBtn.addEventListener('click', function() {
                    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        localStorage.setItem('theme', 'light');
                        themeBtn.textContent = '🌙';
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        localStorage.setItem('theme', 'dark');
                        themeBtn.textContent = '☀️';
                    }
                });
            }
        });
    })();
    </script>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('pages.index') }}" class="brand">EffortOS</a>
        <button id="hamburger" class="hamburger" aria-label="菜单">
            <span></span><span></span><span></span>
        </button>
        <div id="nav-links" class="nav-links">
            <a href="{{ url_for('pages.index') }}" class="{{ 'active' if request.endpoint == 'pages.index' }}">仪表盘</a>
            <a href="{{ url_for('pages.activities') }}" class="{{ 'active' if request.endpoint == 'pages.activities' }}">活动</a>
            <a href="{{ url_for('pages.settings') }}" class="{{ 'active' if request.endpoint == 'pages.settings' }}">设置</a>
            <a href="{{ url_for('pages.ai') }}" class="{{ 'active' if request.endpoint == 'pages.ai' }}">AI 教练</a>
            <a href="{{ url_for('pages.wellness') }}" class="{{ 'active' if request.endpoint == 'pages.wellness' }}">Wellness</a>
            <a href="{{ url_for('pages.gear') }}" class="{{ 'active' if request.endpoint == 'pages.gear' }}">装备</a>
            <a href="/help" class="{{ 'active' if request.endpoint == 'pages.help_page' }}">帮助</a>
        </div>
        <div class="navbar-right">
            <button id="theme-toggle" class="theme-toggle" aria-label="切换主题">🌙</button>
            <span id="user-info" style="display:none;">
                <a href="/profile" id="user-nickname" style="color: var(--text); font-weight: 500;"></a>
                <button id="btn-logout" class="btn btn-secondary btn-sm">登出</button>
            </span>
            <a id="btn-login" href="/login" class="btn btn-primary btn-sm">登录</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block script %}{% endblock %}
    <div class="toast-container" id="toast-container"></div>
    <script>
    window.showToast = function(msg, type, duration) {
        type = type || 'info';
        duration = duration || 3000;
        var container = document.getElementById('toast-container');
        var el = document.createElement('div');
        el.className = 'toast toast-' + type;
        el.textContent = msg;
        container.appendChild(el);
        requestAnimationFrame(function() { el.classList.add('show'); });
        setTimeout(function() {
            el.classList.remove('show');
            setTimeout(function() { el.remove(); }, 300);
        }, duration);
    };
    window.confirmDialog = function(msg) {
        return new Promise(function(resolve) {
            var overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = '<div class="confirm-box"><p>' + msg + '</p><div class="btn-row"><button class="btn btn-secondary" id="confirm-cancel">取消</button><button class="btn btn-primary" id="confirm-ok">确定</button></div></div>';
            document.body.appendChild(overlay);
            overlay.querySelector('#confirm-ok').addEventListener('click', function() { overlay.remove(); resolve(true); });
            overlay.querySelector('#confirm-cancel').addEventListener('click', function() { overlay.remove(); resolve(false); });
            overlay.addEventListener('click', function(e) { if (e.target === overlay) { overlay.remove(); resolve(false); } });
        });
    };
    </script>
</body>
</html>
