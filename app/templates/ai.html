{% extends "base.html" %}

{% block title %}{{ t('ai.title') }} - EffortOS{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1rem;">{{ t('ai.title') }}</h2>

<div class="card" style="margin-bottom: 1rem;">
    <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem;">
        {{ t('ai.report_desc') }}
    </p>
    <button class="btn btn-primary" onclick="generateReport()">{{ t('ai.generate_report') }}</button>
</div>

<div class="card" id="report-card" style="display: none;">
    <div class="card-title">{{ t('ai.training_report') }}</div>
    <div id="report-date" style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem;"></div>
    <div id="report-summary" class="md-content" style="margin-bottom: 1rem;"></div>
    <div id="report-plan"></div>
    <div id="report-outlook" class="md-content" style="margin-top: 1rem;"></div>
    <div id="report-meta" style="margin-top: 1rem; color: var(--text-secondary); font-size: 0.8rem;"></div>

    <div id="ask-section" style="display: none; margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1rem;">
        <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">{{ t('ai.ask_hint') }}</div>
        <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
            <textarea id="question" rows="2" style="flex: 1; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; resize: vertical;" placeholder="{{ t('ai.question_placeholder') }}"></textarea>
            <button class="btn btn-primary" onclick="getSuggestion()" style="white-space: nowrap;">{{ t('ai.ask_about_report') }}</button>
        </div>
        <div id="suggestion-content" class="md-content" style="margin-top: 0.75rem;"></div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
const intensityNames = { rest: t('intensity.rest'), recovery: t('intensity.recovery'), endurance: t('intensity.endurance'), tempo: t('intensity.tempo'), threshold: t('intensity.threshold'), vo2max: t('intensity.vo2max') };
const intensityColors = { rest: '#9ca3af', recovery: '#60a5fa', endurance: '#34d399', tempo: '#fbbf24', threshold: '#f97316', vo2max: '#ef4444' };

function _renderPlanTable(plan) {
    if (!plan || !plan.length) return '';
    let html = '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">';
    html += '<thead><tr style="border-bottom:2px solid var(--border);text-align:left;">';
    html += `<th style="padding:0.5rem 0.4rem;">${t('ai.plan_date')}</th><th style="padding:0.5rem 0.4rem;">${t('ai.plan_type')}</th>`;
    html += `<th style="padding:0.5rem 0.4rem;">${t('ai.plan_intensity')}</th><th style="padding:0.5rem 0.4rem;">${t('ai.plan_duration')}</th>`;
    html += '<th style="padding:0.5rem 0.4rem;text-align:right;">TSS</th>';
    html += '<th style="padding:0.5rem 0.4rem;text-align:right;">CTL</th>';
    html += '<th style="padding:0.5rem 0.4rem;text-align:right;">ATL</th>';
    html += '<th style="padding:0.5rem 0.4rem;text-align:right;">TSB</th>';
    html += '</tr></thead><tbody>';
    for (const r of plan) {
        const il = r.intensity || 'rest';
        const color = intensityColors[il] || '#999';
        const name = intensityNames[il] || il;
        const dur = r.intensity === 'rest' ? '—' : (r.duration_min + t('time.min'));
        const tss = r.intensity === 'rest' ? '—' : r.tss;
        html += '<tr style="border-bottom:1px solid var(--border);">';
        html += `<td style="padding:0.5rem 0.4rem;">${esc(r.date)}</td>`;
        html += `<td style="padding:0.5rem 0.4rem;">${esc(r.type)}</td>`;
        html += `<td style="padding:0.5rem 0.4rem;"><span style="color:${color};font-weight:600;">${esc(name)}</span></td>`;
        html += `<td style="padding:0.5rem 0.4rem;">${dur}</td>`;
        html += `<td style="padding:0.5rem 0.4rem;text-align:right;">${tss}</td>`;
        html += `<td style="padding:0.5rem 0.4rem;text-align:right;">${r.ctl.toFixed(1)}</td>`;
        html += `<td style="padding:0.5rem 0.4rem;text-align:right;">${r.atl.toFixed(1)}</td>`;
        html += `<td style="padding:0.5rem 0.4rem;text-align:right;">${r.tsb.toFixed(1)}</td>`;
        html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
}

function _renderReport(res) {
    const card = document.getElementById('report-card');
    const dateEl = document.getElementById('report-date');
    const summaryEl = document.getElementById('report-summary');
    const planEl = document.getElementById('report-plan');
    const outlookEl = document.getElementById('report-outlook');
    const metaEl = document.getElementById('report-meta');
    const askSection = document.getElementById('ask-section');
    const d = res.data;

    card.style.display = 'block';
    askSection.style.display = 'block';
    if (d.generated_at) {
        const dt = new Date(d.generated_at);
        dateEl.textContent = t('dashboard.generated_at') + ' ' + dt.toLocaleDateString('zh-CN') + ' ' + dt.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
    } else {
        dateEl.textContent = '';
    }
    summaryEl.innerHTML = DOMPurify.sanitize(marked.parse(d.summary || ''));
    planEl.innerHTML = _renderPlanTable(d.plan);
    outlookEl.innerHTML = DOMPurify.sanitize(marked.parse(d.outlook || ''));
    metaEl.textContent = `CTL: ${d.ctl.toFixed(1)} | ATL: ${d.atl.toFixed(1)} | TSB: ${d.tsb.toFixed(1)} | ${t('dashboard.week_activities')}: ${d.week_activities}`;
}

authFetch('/api/ai/weekly-report')
    .then(r => r.json())
    .then(res => { if (res.code === 200 && res.data) _renderReport(res); })
    .catch(() => {});

function generateReport() {
    const card = document.getElementById('report-card');
    const dateEl = document.getElementById('report-date');
    const summaryEl = document.getElementById('report-summary');
    const planEl = document.getElementById('report-plan');
    const outlookEl = document.getElementById('report-outlook');
    const metaEl = document.getElementById('report-meta');
    const askSection = document.getElementById('ask-section');

    card.style.display = 'block';
    askSection.style.display = 'none';
    dateEl.textContent = '';
    summaryEl.innerHTML = '';
    planEl.innerHTML = '<div class="loading"><div class="spinner"></div>' + t('ai.generating') + '</div>';
    outlookEl.innerHTML = '';
    metaEl.textContent = '';

    authFetch('/api/ai/weekly-report', { method: 'POST' })
        .then(r => r.json())
        .then(res => {
            if (res.code !== 200) { planEl.textContent = res.message; planEl.style.color = 'var(--danger)'; return; }
            _renderReport(res);
        })
        .catch(() => { planEl.textContent = t('ai.request_failed_retry'); planEl.style.color = 'var(--danger)'; });
}

function getSuggestion() {
    const question = document.getElementById('question').value;
    const content = document.getElementById('suggestion-content');

    content.innerHTML = '<div class="loading"><div class="spinner"></div>' + t('ai.generating') + '</div>';

    authFetch('/api/ai/suggestion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code !== 200) { content.textContent = res.message; return; }
            content.innerHTML = DOMPurify.sanitize(marked.parse(res.data.suggestion || ''));
        })
        .catch(e => content.textContent = t('dashboard.request_failed') + ': ' + e.message);
}
</script>
{% endblock %}
