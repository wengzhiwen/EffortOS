{% extends "base.html" %}

{% block title %}{{ t('login.login_btn') }} - EffortOS{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card" style="max-width: 400px; margin: 4rem auto;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">{{ t('login.title') }}</h2>

        <div id="step-email">
            <div class="form-group">
                <label for="email">{{ t('login.email_label') }}</label>
                <input type="email" id="email" class="form-input" placeholder="your@email.com" autocomplete="email">
            </div>
            <button id="btn-send-code" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">{{ t('login.send_code') }}</button>
            <p id="email-error" class="error-text" style="display: none;"></p>
        </div>

        <div id="step-code" style="display: none;">
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">
                {{ t('login.code_sent_to') }} <strong id="sent-email"></strong>（{{ t('login.dev_console_hint') }}）
            </p>
            <div class="form-group">
                <label for="code">{{ t('login.code_label') }}</label>
                <input type="text" id="code" class="form-input" placeholder="{{ t('login.code_placeholder') }}" maxlength="6" inputmode="numeric">
            </div>
            <button id="btn-verify" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">{{ t('login.login_btn') }}</button>
            <p id="code-error" class="error-text" style="display: none;"></p>
            <button id="btn-back" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;">{{ t('login.back') }}</button>
        </div>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
(function() {
    const stepEmail = document.getElementById('step-email');
    const stepCode = document.getElementById('step-code');
    const emailInput = document.getElementById('email');
    const codeInput = document.getElementById('code');
    const btnSendCode = document.getElementById('btn-send-code');
    const btnVerify = document.getElementById('btn-verify');
    const btnBack = document.getElementById('btn-back');
    const sentEmail = document.getElementById('sent-email');
    const emailError = document.getElementById('email-error');
    const codeError = document.getElementById('code-error');

    let currentEmail = '';

    function showError(el, msg) {
        el.textContent = msg;
        el.style.display = 'block';
    }
    function hideError(el) {
        el.style.display = 'none';
    }

    btnSendCode.addEventListener('click', async function() {
        hideError(emailError);
        const email = emailInput.value.trim();
        if (!email || !email.includes('@')) {
            showError(emailError, t('login.invalid_email'));
            return;
        }
        btnSendCode.disabled = true;
        btnSendCode.textContent = t('login.sending');

        try {
            const resp = await fetch('/api/auth/request-code', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email}),
            });
            const data = await resp.json();
            if (resp.ok) {
                currentEmail = email;
                sentEmail.textContent = email;
                stepEmail.style.display = 'none';
                stepCode.style.display = 'block';
                codeInput.focus();
                if (data.data && data.data.code) {
                    codeInput.value = data.data.code;
                }
            } else {
                showError(emailError, data.message || t('login.send_failed'));
            }
        } catch (e) {
            showError(emailError, t('login.network_error'));
        } finally {
            btnSendCode.disabled = false;
            btnSendCode.textContent = t('login.send_code');
        }
    });

    btnVerify.addEventListener('click', async function() {
        hideError(codeError);
        const code = codeInput.value.trim();
        if (!code || code.length !== 6) {
            showError(codeError, t('login.invalid_code'));
            return;
        }
        btnVerify.disabled = true;
        btnVerify.textContent = t('login.logging_in');

        try {
            const resp = await fetch('/api/auth/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: currentEmail, code: code}),
            });
            const data = await resp.json();
            if (resp.ok) {
                localStorage.setItem('token', data.data.token);
                localStorage.setItem('user', JSON.stringify(data.data.user));
                const redirect = new URLSearchParams(window.location.search).get('next') || '/';
                window.location.href = redirect;
            } else {
                showError(codeError, data.message || t('login.verify_failed'));
            }
        } catch (e) {
            showError(codeError, t('login.network_error'));
        } finally {
            btnVerify.disabled = false;
            btnVerify.textContent = t('login.login_btn');
        }
    });

    btnBack.addEventListener('click', function() {
        stepCode.style.display = 'none';
        stepEmail.style.display = 'block';
        emailInput.focus();
    });

    emailInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnSendCode.click();
    });
    codeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnVerify.click();
    });
})();
</script>
{% endblock %}
