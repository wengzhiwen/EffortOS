{% extends "base.html" %}

{% block title %}活动详情 - EffortOS{% endblock %}

{% block content %}
<div id="activity-detail">
    <div class="loading"><div class="spinner"></div>加载中...</div>
</div>
{% endblock %}

{% block script %}
<script>
const activityId = "{{ activity_id }}";
const typeNames = window.TYPE_NAMES;
const intensityNames = { recovery: '恢复', endurance: '有氧耐力', tempo: '节奏', threshold: '阈值', vo2max: 'VO2max' };
const intensityColors = { recovery: '#60a5fa', endurance: '#34d399', tempo: '#fbbf24', threshold: '#f97316', vo2max: '#ef4444' };

Promise.all([
    authFetch(`/api/activities/${activityId}`).then(r => r.json()),
    authFetch(`/api/activities/${activityId}/trackpoints`).then(r => r.json()),
    authFetch(`/api/activities/${activityId}/laps?mode=distance&interval=1000`).then(r => r.json()),
]).then(([activityRes, tpRes, lapsRes]) => {
    if (!activityRes.data) throw new Error(activityRes.message || '活动不存在');
    const a = activityRes.data;
    window._activityData = a;
    const s = a.data_summary || {};
    const m = a.computed_metrics || {};
    const tpData = tpRes.data || {};
    const hasTP = tpData.points && tpData.points.length > 0;

    const durSec = s.duration_seconds || 0;
    const duration = durSec ? Math.floor(durSec / 3600) + '时' + Math.floor((durSec % 3600) / 60) + '分' : '—';
    const dist = s.total_distance ? (s.total_distance / 1000).toFixed(2) + ' km' : '—';

    document.getElementById('activity-detail').innerHTML = `
        <div style="display: flex; align-items: baseline; gap: 0.5rem;"><h2 style="margin-bottom: 0.5rem;">${a.name || '未命名活动'}</h2><button onclick="editActivity()" class="btn btn-secondary btn-sm">编辑</button></div>
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">
            ${a.start_time.slice(0, 19).replace('T', ' ')}
            <span class="badge badge-${a.activity_type}" style="margin-left: 0.5rem;">${typeNames[a.activity_type] || a.activity_type}</span>
        </p>

        <div class="grid grid-4" style="margin-bottom: 1rem;">
            <div class="card">
                <div class="card-title">时长</div>
                <div class="metric-value">${duration}</div>
            </div>
            <div class="card">
                <div class="card-title">距离</div>
                <div class="metric-value">${dist}</div>
            </div>
            <div class="card">
                <div class="card-title metric-title">TSS <span class="metric-help">?<span class="metric-tooltip">训练压力分数，衡量此活动对身体的负荷量</span></span></div>
                <div class="metric-value">${m.tss != null ? m.tss.toFixed(1) : '—'}</div>
                <div class="metric-unit">${m.tss_method === 'power' ? '基于功率' : m.tss_method === 'hr' ? '基于心率' : ''}</div>
            </div>
            <div class="card">
                <div class="card-title metric-title">NP / IF <span class="metric-help">?<span class="metric-tooltip">NP: 标准化功率，考虑变速的等效功率。IF: 强度因子 = NP/FTP</span></span></div>
                <div class="metric-value">${m.normalized_power ? m.normalized_power.toFixed(0) + 'W' : '—'}</div>
                <div class="metric-unit">${m.intensity_factor ? 'IF ' + m.intensity_factor.toFixed(2) : ''}</div>
            </div>
        </div>

        ${m.intensity_level ? `
        <div class="card" style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;">
            <div style="width: 12px; height: 12px; border-radius: 50%; background: ${intensityColors[m.intensity_level] || '#999'}; flex-shrink: 0;"></div>
            <div>
                <span style="font-weight: 600; color: ${intensityColors[m.intensity_level] || 'var(--text-primary)'};">${intensityNames[m.intensity_level] || m.intensity_level}</span>
                <span class="metric-unit" style="margin-left: 0.5rem;">强度等级</span>
            </div>
        </div>` : ''}

        <div class="grid grid-4" style="margin-bottom: 1rem;">
            <div class="card">
                <div class="card-title">平均/最大心率</div>
                <div class="metric-value">${s.avg_heart_rate || '—'} <span class="metric-unit">/ ${s.max_heart_rate || '—'} bpm</span></div>
            </div>
            <div class="card">
                <div class="card-title">平均/最大功率</div>
                <div class="metric-value">${s.avg_power ? s.avg_power.toFixed(0) : '—'} <span class="metric-unit">/ ${s.max_power || '—'} W</span></div>
            </div>
            <div class="card">
                <div class="card-title metric-title">做功 / VI / EF <span class="metric-help">?<span class="metric-tooltip">做功: 总能量消耗。VI: 变异性指数 = NP/avgPower。EF: 效率因子 = NP/avgHR</span></span></div>
                <div class="metric-value" style="font-size: 1.25rem;">${m.work_kj ? m.work_kj.toFixed(0) + ' kJ' : '—'}</div>
                <div class="metric-unit">VI ${m.variability_index ? m.variability_index.toFixed(2) : '—'} / EF ${m.efficiency_factor ? m.efficiency_factor.toFixed(3) : '—'}</div>
            </div>
            <div class="card">
                <div class="card-title">平均/最大踏频</div>
                <div class="metric-value">${s.avg_cadence || '—'} <span class="metric-unit">/ ${s.max_cadence || '—'} rpm</span></div>
            </div>
        </div>

        ${hasTP ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div class="card-title">心率曲线</div>
            <canvas id="hr-chart" height="180"></canvas>
        </div>

        <div class="grid grid-2" style="margin-bottom: 1rem;">
            ${tpData.points.some(p => p.power != null) ? `
            <div class="card">
                <div class="card-title">功率曲线</div>
                <canvas id="power-chart" height="180"></canvas>
            </div>` : ''}
            ${tpData.points.some(p => p.speed != null) ? `
            <div class="card">
                <div class="card-title">速度曲线</div>
                <canvas id="speed-chart" height="180"></canvas>
            </div>` : ''}
            ${tpData.points.some(p => p.cadence != null) ? `
            <div class="card">
                <div class="card-title">踏频曲线</div>
                <canvas id="cadence-chart" height="180"></canvas>
            </div>` : ''}
        </div>

        ${tpData.points.some(p => p.altitude != null) ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div class="card-title">海拔曲线</div>
            <canvas id="altitude-chart" height="150"></canvas>
        </div>` : ''}
        ` : ''}

        <div class="grid grid-2" style="margin-bottom: 1rem;">
            ${m.hr_zones_time && Object.keys(m.hr_zones_time).length > 0 ? `
            <div class="card">
                <div class="card-title">心率分区时间</div>
                <canvas id="hr-zones-chart" height="150"></canvas>
            </div>` : ''}
            ${m.power_zones_time && Object.keys(m.power_zones_time).length > 0 ? `
            <div class="card">
                <div class="card-title">功率分区时间</div>
                <canvas id="power-zones-chart" height="150"></canvas>
            </div>` : ''}
        </div>

        ${m.best_efforts && (m.best_efforts.power || m.best_efforts.heart_rate) ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div class="card-title">最佳表现</div>
            <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                <thead><tr style="border-bottom: 2px solid var(--border);">
                    <th style="text-align: left; padding: 0.4rem 0.6rem;">时长</th>
                    ${m.best_efforts.power ? '<th style="text-align: right; padding: 0.4rem 0.6rem;">峰值功率</th>' : ''}
                    ${m.best_efforts.heart_rate ? '<th style="text-align: right; padding: 0.4rem 0.6rem;">峰值心率</th>' : ''}
                </tr></thead>
                <tbody>
                ${Object.keys(m.best_efforts.power || m.best_efforts.heart_rate).sort((a,b) => parseInt(a)-parseInt(b)).map(w => {
                    const wn = parseInt(w);
                    const label = wn < 60 ? wn + '秒' : wn < 3600 ? (wn/60) + '分钟' : (wn/3600) + '小时';
                    const pw = m.best_efforts.power && m.best_efforts.power[w];
                    const hr = m.best_efforts.heart_rate && m.best_efforts.heart_rate[w];
                    return `<tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 0.4rem 0.6rem;">${label}</td>
                        ${m.best_efforts.power ? `<td style="text-align: right; padding: 0.4rem 0.6rem; font-weight: 600; color: #2563eb;">${pw ? pw + ' W' : '—'}</td>` : ''}
                        ${m.best_efforts.heart_rate ? `<td style="text-align: right; padding: 0.4rem 0.6rem; font-weight: 600; color: #dc2626;">${hr ? hr + ' bpm' : '—'}</td>` : ''}
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
        </div>` : ''}

        ${lapsRes.data && lapsRes.data.length > 0 ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="card-title">分段分析</div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-sm lap-mode-btn active" data-mode="distance" data-interval="1000" onclick="switchLapMode(this)">每公里</button>
                    <button class="btn btn-sm lap-mode-btn" data-mode="time" data-interval="300" onclick="switchLapMode(this)">每 5 分钟</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="laps-table" style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
                    <thead><tr style="border-bottom: 2px solid var(--border);">
                        <th style="padding: 0.4rem 0.5rem;">#</th>
                        <th style="padding: 0.4rem 0.5rem;">时长</th>
                        <th style="padding: 0.4rem 0.5rem;">距离</th>
                        <th style="padding: 0.4rem 0.5rem;">配速</th>
                        <th style="padding: 0.4rem 0.5rem;">心率</th>
                        <th style="padding: 0.4rem 0.5rem;">功率</th>
                        <th style="padding: 0.4rem 0.5rem;">踏频</th>
                    </tr></thead>
                    <tbody id="laps-body">
                        ${lapsRes.data.map(lap => lapRow(lap)).join('')}
                    </tbody>
                </table>
            </div>
        </div>` : ''}

        ${a.notes ? `<div class="card" style="margin-bottom: 1rem;"><div class="card-title">训练感受</div><p style="white-space: pre-wrap; line-height: 1.6;">${a.notes.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p></div>` : ''}

        <a href="/activities" class="btn btn-primary" style="margin-top: 1rem;">返回列表</a>
    `;

    // 时间序列图表
    if (hasTP) {
        const points = tpData.points;
        const labels = points.map(p => {
            const min = Math.floor(p.elapsed / 60);
            const sec = Math.floor(p.elapsed % 60);
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        });

        const chartOpts = {
            responsive: true,
            scales: { x: { display: true, ticks: { maxTicksLimit: 10 } }, y: { beginAtZero: false } },
            plugins: { legend: { display: false } },
            elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } },
        };

        // 心率
        const hrData = points.map(p => p.hr);
        if (hrData.some(v => v != null)) {
            new Chart(document.getElementById('hr-chart'), {
                type: 'line',
                data: { labels, datasets: [{ label: '心率', data: hrData, borderColor: '#dc2626', fill: true, backgroundColor: 'rgba(220,38,38,0.1)' }] },
                options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, title: { display: true, text: 'bpm' } } } },
            });
        }

        // 功率
        const powerData = points.map(p => p.power);
        if (powerData.some(v => v != null)) {
            const el = document.getElementById('power-chart');
            if (el) {
                new Chart(el, {
                    type: 'line',
                    data: { labels, datasets: [{ label: '功率', data: powerData, borderColor: '#2563eb', fill: true, backgroundColor: 'rgba(37,99,235,0.1)' }] },
                    options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, title: { display: true, text: 'W' } } } },
                });
            }
        }

        // 速度
        const speedData = points.map(p => p.speed ? (p.speed * 3.6) : null);
        if (speedData.some(v => v != null)) {
            const el = document.getElementById('speed-chart');
            if (el) {
                new Chart(el, {
                    type: 'line',
                    data: { labels, datasets: [{ label: '速度', data: speedData, borderColor: '#16a34a', fill: true, backgroundColor: 'rgba(22,163,74,0.1)' }] },
                    options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, title: { display: true, text: 'km/h' } } } },
                });
            }
        }

        // 踏频
        const cadenceData = points.map(p => p.cadence);
        if (cadenceData.some(v => v != null)) {
            const el = document.getElementById('cadence-chart');
            if (el) {
                new Chart(el, {
                    type: 'line',
                    data: { labels, datasets: [{ label: '踏频', data: cadenceData, borderColor: '#8b5cf6', fill: true, backgroundColor: 'rgba(139,92,246,0.1)' }] },
                    options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, title: { display: true, text: 'rpm' } } } },
                });
            }
        }

        // 海拔
        const altData = points.map(p => p.altitude);
        if (altData.some(v => v != null)) {
            const el = document.getElementById('altitude-chart');
            if (el) {
                new Chart(el, {
                    type: 'line',
                    data: { labels, datasets: [{ label: '海拔', data: altData, borderColor: '#d97706', fill: true, backgroundColor: 'rgba(217,119,6,0.1)' }] },
                    options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, title: { display: true, text: 'm' } } } },
                });
            }
        }
    }

    // 心率分区图
    if (m.hr_zones_time && Object.keys(m.hr_zones_time).length > 0) {
        const hrLabels = Object.keys(m.hr_zones_time);
        const hrValues = Object.values(m.hr_zones_time).map(v => (v / 60).toFixed(1));
        new Chart(document.getElementById('hr-zones-chart'), {
            type: 'bar',
            data: {
                labels: hrLabels,
                datasets: [{ label: '时间（分钟）', data: hrValues, backgroundColor: ['#dbeafe', '#93c5fd', '#60a5fa', '#3b82f6', '#1d4ed8'] }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    // 功率分区图
    if (m.power_zones_time && Object.keys(m.power_zones_time).length > 0) {
        const pwLabels = Object.keys(m.power_zones_time);
        const pwValues = Object.values(m.power_zones_time).map(v => (v / 60).toFixed(1));
        new Chart(document.getElementById('power-zones-chart'), {
            type: 'bar',
            data: {
                labels: pwLabels,
                datasets: [{ label: '时间（分钟）', data: pwValues, backgroundColor: ['#dcfce7', '#bbf7d0', '#86efac', '#4ade80', '#22c55e', '#16a34a', '#166534'] }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }
}).catch(err => {
    document.getElementById('activity-detail').innerHTML = `<div class="card" style="text-align:center;color:var(--text-secondary);padding:2rem;">加载失败: ${err.message}<br><a href="/activities" class="btn btn-primary" style="margin-top:1rem;">返回列表</a></div>`;
});

function editActivity() {
    const a = window._activityData;
    if (!a) return;
    const overlay = document.createElement('div');
    overlay.id = 'edit-modal-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;';
    const typeOptions = Object.entries(typeNames).map(([k,v]) => `<option value="${k}" ${a.activity_type===k?'selected':''}>${v}</option>`).join('');
    overlay.innerHTML = `<div style="background:var(--card-bg);padding:1.5rem;border-radius:8px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid var(--border);">
        <h3 style="margin-bottom:1rem;">编辑活动</h3>
        <div class="form-group"><label>名称</label><input type="text" id="edit-name" value="${(a.name||'').replace(/"/g,'&quot;')}" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;"></div>
        <div class="form-group"><label>运动类型</label><select id="edit-type" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">${typeOptions}</select></div>
        <div class="form-group"><label>训练感受</label><textarea id="edit-notes" rows="4" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">${(a.notes||'').replace(/</g,'&lt;')}</textarea></div>
        <div style="display:flex;gap:0.5rem;margin-top:1rem;">
            <button class="btn btn-primary" onclick="saveEdit()">保存</button>
            <button class="btn btn-secondary" onclick="closeEdit()">取消</button>
        </div>
    </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) closeEdit(); });
    document.body.appendChild(overlay);
}

function closeEdit() {
    const m = document.getElementById('edit-modal-overlay');
    if (m) m.remove();
}

function saveEdit() {
    const name = document.getElementById('edit-name').value;
    const type = document.getElementById('edit-type').value;
    const notes = document.getElementById('edit-notes').value;
    authFetch(`/api/activities/${activityId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, activity_type: type, notes }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) location.reload();
            else showToast(res.message, 'error');
        });
}

function lapRow(lap) {
    const dur = lap.duration_seconds;
    const durStr = dur >= 3600 ? Math.floor(dur/3600) + ':' + String(Math.floor((dur%3600)/60)).padStart(2,'0') + ':' + String(Math.floor(dur%60)).padStart(2,'0')
        : Math.floor(dur/60) + ':' + String(Math.floor(dur%60)).padStart(2,'0');
    const distStr = lap.distance_meters ? (lap.distance_meters / 1000).toFixed(2) + ' km' : '—';
    const pace = lap.avg_speed_kmh ? (60 / lap.avg_speed_kmh).toFixed(0) + ':' + String(Math.floor((60 / lap.avg_speed_kmh % 1) * 60)).padStart(2,'0') + ' /km' : '—';
    const hr = lap.avg_hr ? lap.avg_hr + (lap.max_hr ? ' / ' + lap.max_hr : '') + ' bpm' : '—';
    const pw = lap.avg_power ? lap.avg_power + (lap.max_power ? ' / ' + lap.max_power : '') + ' W' : '—';
    const cad = lap.avg_cadence ? lap.avg_cadence + ' rpm' : '—';
    return `<tr style="border-bottom: 1px solid var(--border);">
        <td style="padding: 0.4rem 0.5rem; font-weight: 600;">${lap.lap}</td>
        <td style="padding: 0.4rem 0.5rem;">${durStr}</td>
        <td style="padding: 0.4rem 0.5rem;">${distStr}</td>
        <td style="padding: 0.4rem 0.5rem;">${pace}</td>
        <td style="padding: 0.4rem 0.5rem;">${hr}</td>
        <td style="padding: 0.4rem 0.5rem;">${pw}</td>
        <td style="padding: 0.4rem 0.5rem;">${cad}</td>
    </tr>`;
}

function switchLapMode(btn) {
    document.querySelectorAll('.lap-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn.style.background = 'var(--primary)';
    btn.style.color = 'white';
    document.querySelectorAll('.lap-mode-btn:not(.active)').forEach(b => { b.style.background = ''; b.style.color = ''; });

    const mode = btn.dataset.mode;
    const interval = btn.dataset.interval;
    authFetch(`/api/activities/${activityId}/laps?mode=${mode}&interval=${interval}`)
        .then(r => r.json())
        .then(res => {
            const body = document.getElementById('laps-body');
            if (res.data && res.data.length > 0) {
                body.innerHTML = res.data.map(lap => lapRow(lap)).join('');
            } else {
                body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);">数据不足</td></tr>';
            }
        });
}
</script>
{% endblock %}
