{% extends "base.html" %}

{% block title %}{{ t('activity_detail.title') }} - EffortOS{% endblock %}

{% block content %}
<div id="activity-detail">
    <div class="loading"><div class="spinner"></div>{{ t('activity_detail.loading') }}</div>
</div>
{% endblock %}

{% block script %}
<script>
const activityId = "{{ activity_id }}";
const typeNames = window.TYPE_NAMES;
const intensityNames = { recovery: t('intensity.recovery'), endurance: t('intensity.endurance'), tempo: t('intensity.tempo'), threshold: t('intensity.threshold'), vo2max: t('intensity.vo2max') };
const intensityColors = { recovery: '#60a5fa', endurance: '#34d399', tempo: '#fbbf24', threshold: '#f97316', vo2max: '#ef4444' };

Promise.all([
    authFetch(`/api/activities/${activityId}`).then(r => r.json()),
    authFetch(`/api/activities/${activityId}/trackpoints`).then(r => r.json()),
    authFetch(`/api/activities/${activityId}/laps?mode=distance&interval=1000`).then(r => r.json()),
    authFetch('/api/activities/power-curve').then(r => r.json()),
]).then(([activityRes, tpRes, lapsRes, curveRes]) => {
    if (!activityRes.data) throw new Error(activityRes.message || t('activity_detail.load_failed'));
    const a = activityRes.data;
    window._activityData = a;
    const s = a.data_summary || {};
    const m = a.computed_metrics || {};
    const tpData = tpRes.data || {};
    const hasTP = tpData.points && tpData.points.length > 0;

    const durSec = s.duration_seconds || 0;
    const duration = fmtDur(durSec);
    const dist = s.total_distance ? (s.total_distance / 1000).toFixed(2) + ' km' : '—';
    const elevGain = s.elevation_gain ? s.elevation_gain.toFixed(0) + ' m' : null;

    document.getElementById('activity-detail').innerHTML = `
        <div style="display: flex; align-items: baseline; gap: 0.5rem;"><h2 style="margin-bottom: 0.5rem;">${esc(a.name || t('activity_detail.unnamed'))}</h2><button onclick="editActivity()" class="btn btn-secondary btn-sm">${t('activity_detail.edit')}</button></div>
        ${a.suggested_type ? `
        <div id="type-suggestion" style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 1rem;margin-bottom:0.75rem;background:var(--primary-light);border:1px solid var(--primary);border-radius:8px;font-size:0.9rem;">
            <span>${t('activity_detail.current_marked_but')} <strong>${typeNames[a.activity_type] || a.activity_type}</strong>${t('activity_detail.but_data_like')} <strong>${typeNames[a.suggested_type] || a.suggested_type}</strong></span>
            <button class="btn btn-primary btn-sm" onclick="applySuggestedType('${a.suggested_type}')">${t('activity_detail.fix_to')}${typeNames[a.suggested_type] || a.suggested_type}</button>
            <button class="btn btn-secondary btn-sm" onclick="dismissSuggestion()" style="padding:0.25rem 0.5rem;font-size:0.8rem;">${t('activity_detail.ignore')}</button>
        </div>` : ''}
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">
            ${a.start_time.slice(0, 19).replace('T', ' ')}
            <span class="badge badge-${a.activity_type}" style="margin-left: 0.5rem;">${typeNames[a.activity_type] || a.activity_type}</span>
        </p>

        <div class="grid grid-4" style="margin-bottom: 1rem;">
            <div class="card">
                <div class="card-title">${t('activity_detail.duration')}</div>
                <div class="metric-value">${duration}</div>
            </div>
            <div class="card">
                <div class="card-title">${t('activity_detail.distance')}</div>
                <div class="metric-value">${dist}</div>
            </div>
            <div class="card" id="tss-card">
                <div class="card-title metric-title">
                    TSS <span class="metric-help">?<span class="metric-tooltip">${t('activity_detail.tss_tooltip')}</span></span>
                </div>
                <div class="metric-value" id="tss-display" style="cursor:pointer" title="${t('activity_detail.click_edit_tss')}">
                    ${m.manual_tss != null ? m.manual_tss.toFixed(1) : m.tss != null ? m.tss.toFixed(1) : '—'}
                </div>
                <div class="metric-unit" id="tss-sub">
                    ${m.manual_tss != null
                        ? `${t('activity_detail.manual_set')}${m.tss != null ? '（' + t('activity_detail.calc_value') + ' ' + m.tss.toFixed(1) + '）' : ''}`
                        : m.tss_method === 'power' ? t('activity_detail.power_based') : ''}
                </div>
                <div id="tss-editor" style="display:none; margin-top:0.5rem;">
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <input type="number" step="0.1" id="tss-input" style="width:80px; padding:4px 8px; border:1px solid var(--border); border-radius:4px; background:var(--input-bg); color:var(--text);" value="${m.manual_tss != null ? m.manual_tss : m.tss != null ? m.tss.toFixed(1) : ''}">
                        <button class="btn btn-sm btn-primary" onclick="saveTss()">${t('activity_detail.save_btn')}</button>
                        <button class="btn btn-sm btn-secondary" onclick="cancelTssEdit()">${t('activity_detail.cancel_btn')}</button>
                        ${m.manual_tss != null ? `<button class="btn btn-sm btn-secondary" onclick="clearTss()" style="color:var(--danger)">${t('activity_detail.clear_manual')}</button>` : ''}
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-title metric-title">hrTSS <span class="metric-help">?<span class="metric-tooltip">${t('activity_detail.hr_tss_tooltip')}</span></span></div>
                <div class="metric-value">${m.hr_tss != null ? m.hr_tss.toFixed(1) : '—'}</div>
                <div class="metric-unit">${t('activity_detail.hr_based')}</div>
            </div>
            <div class="card">
                <div class="card-title metric-title">${t('activity_detail.np_if')} <span class="metric-help">?<span class="metric-tooltip">${t('activity_detail.np_if_tooltip')}</span></span></div>
                <div class="metric-value">${m.normalized_power ? m.normalized_power.toFixed(0) + 'W' : '—'}</div>
                <div class="metric-unit">${m.intensity_factor ? 'IF ' + m.intensity_factor.toFixed(2) : ''}</div>
            </div>
        </div>

        ${m.intensity_level ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div style="width: 12px; height: 12px; border-radius: 50%; background: ${intensityColors[m.intensity_level] || '#999'}; flex-shrink: 0;"></div>
                <span style="font-weight: 600; color: ${intensityColors[m.intensity_level] || 'var(--text-primary)'};">${intensityNames[m.intensity_level] || m.intensity_level}</span>
                <span class="metric-unit">${t('activity_detail.intensity_level')}</span>
                ${m.intensity_reason && m.intensity_reason.method ? `<span class="metric-unit">（${m.intensity_reason.method === 'power' ? t('activity_detail.power_based') : t('activity_detail.hr_based')}）</span>` : ''}
                ${m.intensity_reason && m.intensity_reason.strict === false ? `<span class="metric-unit" style="color: var(--text-secondary);">${t('activity_detail.approx')}</span>` : ''}
            </div>
            ${m.intensity_reason && m.intensity_reason.matched ? `<div style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.4rem; padding-left: 1.5rem;">${m.intensity_reason.matched}</div>` : ''}
            ${m.intensity_reason && m.intensity_reason.zone_times && Object.keys(m.intensity_reason.zone_times).length > 0 ? `
            <div style="margin-top: 0.5rem; padding-left: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.25rem 1rem; font-size: 0.8rem; color: var(--text-secondary);">
                ${Object.entries(m.intensity_reason.zone_times).filter(([,v]) => v > 0).sort((a,b) => a[0].localeCompare(b[0])).map(([z,tv]) =>
                    `<span>${z}: ${tv >= 60 ? Math.round(tv/60) + t('time.minute') : Math.round(tv) + t('time.second')}</span>`
                ).join('')}
            </div>` : ''}
        </div>` : ''}

        <div class="grid grid-4" style="margin-bottom: 1rem;">
            <div class="card">
                <div class="card-title">${t('activity_detail.avg_max_hr')}</div>
                <div class="metric-value">${s.avg_heart_rate || '—'} <span class="metric-unit">/ ${s.max_heart_rate || '—'} bpm</span></div>
            </div>
            <div class="card">
                <div class="card-title">${t('activity_detail.avg_max_power')}</div>
                <div class="metric-value">${s.avg_power ? s.avg_power.toFixed(0) : '—'} <span class="metric-unit">/ ${s.max_power || '—'} W</span></div>
            </div>
            <div class="card">
                <div class="card-title metric-title">${t('activity_detail.work_vi_ef')} <span class="metric-help">?<span class="metric-tooltip">${t('activity_detail.work_vi_ef_tooltip')}</span></span></div>
                <div class="metric-value" style="font-size: 1.25rem;">${m.work_kj ? m.work_kj.toFixed(0) + ' kJ' : '—'}</div>
                <div class="metric-unit">VI ${m.variability_index ? m.variability_index.toFixed(2) : '—'} / EF ${m.efficiency_factor ? m.efficiency_factor.toFixed(3) : '—'}</div>
            </div>
            <div class="card">
                <div class="card-title">${t('activity_detail.avg_max_cadence')}</div>
                <div class="metric-value">${s.avg_cadence || '—'} <span class="metric-unit">/ ${s.max_cadence || '—'} rpm</span></div>
            </div>
            ${elevGain ? `
            <div class="card">
                <div class="card-title">${t('activity_detail.elevation_gain_loss')}</div>
                <div class="metric-value">${s.elevation_gain.toFixed(0)} <span class="metric-unit">m</span> / ${s.elevation_loss ? s.elevation_loss.toFixed(0) : '—'} <span class="metric-unit">m</span></div>
            </div>` : ''}
        </div>

        ${(() => {
            const gpsPoints = hasTP ? tpData.points.filter(p => p.latitude != null && p.longitude != null) : [];
            if (gpsPoints.length < 10) return '';
            return `
        <div class="card" style="margin-bottom: 1rem; padding: 0; overflow: hidden;">
            <div class="card-title" style="padding: 0.75rem 1.25rem 0;">${t('activity_detail.route_map')}</div>
            <div id="activity-map" style="height: 360px; width: 100%; border-radius: 0 0 8px 8px;"></div>
        </div>`;
        })()}

        ${hasTP ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
                <div class="card-title" style="margin-bottom: 0;">${t('activity_detail.chart_title')}</div>
                <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
                    <div class="chart-xaxis-toggle">
                        <button class="btn btn-sm active" id="xaxis-time" onclick="switchXAxis('time')">${t('activity_detail.xaxis_time')}</button>
                        <button class="btn btn-sm" id="xaxis-distance" onclick="switchXAxis('distance')">${t('activity_detail.xaxis_distance')}</button>
                    </div>
                </div>
            </div>
            <div class="chart-tabs" style="margin-top: 0.5rem;">
                ${tpData.points.some(p => p.hr != null) ? '<button class="chart-tab active" onclick="switchChart(\'hr\')">' + t('activity_detail.tab_hr') + '</button>' : ''}
                ${tpData.points.some(p => p.power != null) ? '<button class="chart-tab" onclick="switchChart(\'power\')">' + t('activity_detail.tab_power') + '</button>' : ''}
                ${tpData.points.some(p => p.speed != null) ? '<button class="chart-tab" onclick="switchChart(\'speed\')">' + t('activity_detail.tab_speed') + '</button>' : ''}
                ${tpData.points.some(p => p.cadence != null) ? '<button class="chart-tab" onclick="switchChart(\'cadence\')">' + t('activity_detail.tab_cadence') + '</button>' : ''}
                ${tpData.points.some(p => p.altitude != null) ? '<button class="chart-tab" onclick="switchChart(\'altitude\')">' + t('activity_detail.tab_altitude') + '</button>' : ''}
            </div>
            <canvas id="main-chart" height="200" style="margin-top: 0.5rem;"></canvas>
        </div>
        ` : `
        <div class="card" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
            <p style="font-size: 0.95rem;">${t('activity_detail.no_timeseries')}</p>
            <p style="font-size: 0.85rem; margin-top: 0.5rem;">${t('activity_detail.upload_hint')}</p>
        </div>
        `}

        <div class="grid grid-2" style="margin-bottom: 1rem;">
            ${m.hr_zones_time && Object.keys(m.hr_zones_time).length > 0 ? `
            <div class="card">
                <div class="card-title">${t('activity_detail.hr_zones_time')}</div>
                <canvas id="hr-zones-chart" height="150"></canvas>
            </div>` : ''}
            ${m.power_zones_time && Object.keys(m.power_zones_time).length > 0 ? `
            <div class="card">
                <div class="card-title">${t('activity_detail.power_zones_time')}</div>
                <canvas id="power-zones-chart" height="150"></canvas>
            </div>` : ''}
        </div>

        ${m.best_efforts && (m.best_efforts.power || m.best_efforts.heart_rate) ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div class="card-title">${t('activity_detail.best_efforts')}</div>
            <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                <thead><tr style="border-bottom: 2px solid var(--border);">
                    <th style="text-align: left; padding: 0.4rem 0.6rem;">${t('activity_detail.duration_header')}</th>
                    ${m.best_efforts.power ? '<th style="text-align: right; padding: 0.4rem 0.6rem;">' + t('activity_detail.peak_power') + '</th>' : ''}
                    ${m.best_efforts.heart_rate ? '<th style="text-align: right; padding: 0.4rem 0.6rem;">' + t('activity_detail.peak_hr') + '</th>' : ''}
                </tr></thead>
                <tbody>
                ${Object.keys(m.best_efforts.power || m.best_efforts.heart_rate).sort((a,b) => parseInt(a)-parseInt(b)).map(w => {
                    const wn = parseInt(w);
                    const label = wn < 60 ? wn + t('time.second') : wn < 3600 ? (wn/60) + t('time.minute') : (wn/3600) + t('time.hour');
                    const pw = m.best_efforts.power && m.best_efforts.power[w];
                    const hr = m.best_efforts.heart_rate && m.best_efforts.heart_rate[w];
                    const histPw = curveRes.data && curveRes.data.power && curveRes.data.power[w];
                    const isPb = pw && histPw && pw >= histPw;
                    const pbBadge = isPb ? ' <span style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;font-size:0.65rem;padding:1px 4px;border-radius:3px;font-weight:700;">PB</span>' : '';
                    return `<tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 0.4rem 0.6rem;">${label}</td>
                        ${m.best_efforts.power ? `<td style="text-align: right; padding: 0.4rem 0.6rem; font-weight: 600; color: #2563eb;">${pw ? pw + ' W' : '—'}${pbBadge}</td>` : ''}
                        ${m.best_efforts.heart_rate ? `<td style="text-align: right; padding: 0.4rem 0.6rem; font-weight: 600; color: #dc2626;">${hr ? hr + ' bpm' : '—'}</td>` : ''}
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
        </div>` : ''}

        ${m.best_efforts && m.best_efforts.power && curveRes.data && curveRes.data.power && Object.keys(curveRes.data.power).length > 0 ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div class="card-title">${t('activity_detail.power_curve_title')}</div>
            <canvas id="power-curve-chart" height="200"></canvas>
        </div>` : ''}

        ${lapsRes.data && lapsRes.data.length > 0 ? `
        <div class="card" style="margin-bottom: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="card-title">${t('activity_detail.lap_analysis')}</div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-sm lap-mode-btn active" data-mode="distance" data-interval="1000" onclick="switchLapMode(this)">${t('activity_detail.per_km')}</button>
                    <button class="btn btn-sm lap-mode-btn" data-mode="time" data-interval="300" onclick="switchLapMode(this)">${t('activity_detail.per_5min')}</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="laps-table" style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
                    <thead><tr style="border-bottom: 2px solid var(--border);">
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_num')}</th>
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_duration')}</th>
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_distance')}</th>
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_pace')}</th>
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_hr')}</th>
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_power')}</th>
                        <th style="padding: 0.4rem 0.5rem;">${t('activity_detail.lap_cadence')}</th>
                    </tr></thead>
                    <tbody id="laps-body">
                        ${lapsRes.data.map(lap => lapRow(lap)).join('')}
                    </tbody>
                </table>
            </div>
        </div>` : ''}

        ${a.notes ? `<div class="card" style="margin-bottom: 1rem;"><div class="card-title">${t('activity_detail.training_feel')}</div><p style="white-space: pre-wrap; line-height: 1.6;">${a.notes.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p></div>` : ''}

        <a href="/activities" class="btn btn-primary" style="margin-top: 1rem;">${t('activity_detail.back_to_list')}</a>
    `;
    document.title = (a.name || t('activity_detail.unnamed')) + ' - EffortOS';

    // 地图辅助函数
    function smoothValues(arr, window) {
        const result = [];
        const half = Math.floor(window / 2);
        for (let i = 0; i < arr.length; i++) {
            let sum = 0, count = 0;
            for (let j = Math.max(0, i - half); j <= Math.min(arr.length - 1, i + half); j++) {
                sum += arr[j]; count++;
            }
            result.push(sum / count);
        }
        return result;
    }
    function valueToColor(tv) {
        tv = Math.max(0, Math.min(1, tv));
        const stops = [
            [0, 59, 130, 246],
            [0.3, 34, 197, 94],
            [0.6, 250, 204, 21],
            [0.85, 249, 115, 22],
            [1, 239, 68, 68],
        ];
        let lo = stops[0], hi = stops[stops.length - 1];
        for (let i = 0; i < stops.length - 1; i++) {
            if (tv >= stops[i][0] && tv <= stops[i + 1][0]) { lo = stops[i]; hi = stops[i + 1]; break; }
        }
        const ratio = (tv - lo[0]) / (hi[0] - lo[0]);
        const r = Math.round(lo[1] + (hi[1] - lo[1]) * ratio);
        const g = Math.round(lo[2] + (hi[2] - lo[2]) * ratio);
        const b = Math.round(lo[3] + (hi[3] - lo[3]) * ratio);
        return `rgb(${r},${g},${b})`;
    }

    // 路线地图
    const gpsPoints = hasTP ? tpData.points.filter(p => p.latitude != null && p.longitude != null) : [];
    if (gpsPoints.length >= 10) {
        const latlngs = gpsPoints.map(p => [p.latitude, p.longitude]);
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const tileUrl = isDark
            ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
            : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        const map = L.map('activity-map', {
            zoomControl: true,
            attributionControl: false,
        });
        L.tileLayer(tileUrl, { maxZoom: 18 }).addTo(map);

        const hasPower = gpsPoints.some(p => p.power != null);
        const values = gpsPoints.map(p => hasPower ? (p.power || 0) : (p.speed != null ? p.speed * 3.6 : 0));
        const smoothed = smoothValues(values, Math.max(5, Math.floor(gpsPoints.length / 50)));
        const valMin = Math.min(...smoothed.filter(v => v > 0));
        const valMax = Math.max(...smoothed);
        const colorFn = valMax > valMin ? (v) => valueToColor((v - valMin) / (valMax - valMin)) : () => '#3b82f6';

        let allBounds = null;
        for (let i = 0; i < gpsPoints.length - 1; i++) {
            const color = colorFn(smoothed[i]);
            const seg = L.polyline([latlngs[i], latlngs[i + 1]], { color, weight: 3, opacity: 0.9 }).addTo(map);
            if (!allBounds) allBounds = seg.getBounds();
            else allBounds.extend(seg.getBounds());
        }
        if (allBounds) map.fitBounds(allBounds, { padding: [15, 15] });

        L.circleMarker(latlngs[0], { radius: 6, color: '#22c55e', fillColor: '#22c55e', fillOpacity: 1, weight: 2 })
            .addTo(map).bindTooltip(t('activity_detail.start_point'), { permanent: false });
        L.circleMarker(latlngs[latlngs.length - 1], { radius: 6, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 1, weight: 2 })
            .addTo(map).bindTooltip(t('activity_detail.end_point'), { permanent: false });

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'map-legend');
            const label = hasPower ? t('activity_detail.power_legend') : t('activity_detail.speed_legend');
            div.innerHTML = `<div class="map-legend-title">${label}</div>
                <div class="map-legend-bar"></div>
                <div class="map-legend-labels"><span>${Math.round(valMin)}</span><span>${Math.round(valMax)}</span></div>`;
            return div;
        };
        legend.addTo(map);
    }

    // 时间序列图表
    if (hasTP) {
        const points = tpData.points;
        const timeLabels = points.map(p => {
            const min = Math.floor(p.elapsed / 60);
            const sec = Math.floor(p.elapsed % 60);
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        });

        const crosshairPlugin = {
            id: 'crosshair',
            afterDraw(chart) {
                if (chart.tooltip && chart.tooltip._active && chart.tooltip._active.length) {
                    const x = chart.tooltip._active[0].element.x;
                    const yAxis = chart.scales.y;
                    const ctx = chart.ctx;
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(x, yAxis.top);
                    ctx.lineTo(x, yAxis.bottom);
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = 'rgba(150,150,150,0.4)';
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        };

        const chartOpts = {
            responsive: true,
            animation: false,
            interaction: { mode: 'index', intersect: false },
            scales: { x: { display: true, ticks: { maxTicksLimit: 10 } }, y: { beginAtZero: false } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    titleFont: { size: 12 },
                    bodyFont: { size: 12 },
                    padding: 8,
                    displayColors: false,
                    callbacks: {
                        title: function(items) { return items[0].label; },
                        label: function(ctx) { return ctx.dataset.label + ': ' + (ctx.parsed.y != null ? ctx.parsed.y.toFixed(1) : '—'); }
                    }
                }
            },
            elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } },
        };

        const chartSeries = {};
        const hrArr = points.map(p => p.hr);
        if (hrArr.some(v => v != null)) chartSeries.hr = { label: t('activity_detail.tab_hr'), data: hrArr, color: '#dc2626', unit: 'bpm' };
        const pwArr = points.map(p => p.power);
        if (pwArr.some(v => v != null)) chartSeries.power = { label: t('activity_detail.tab_power'), data: pwArr, color: '#2563eb', unit: 'W' };
        const spArr = points.map(p => p.speed ? (p.speed * 3.6) : null);
        if (spArr.some(v => v != null)) chartSeries.speed = { label: t('activity_detail.tab_speed'), data: spArr, color: '#16a34a', unit: 'km/h' };
        const cdArr = points.map(p => p.cadence);
        if (cdArr.some(v => v != null)) chartSeries.cadence = { label: t('activity_detail.tab_cadence'), data: cdArr, color: '#8b5cf6', unit: 'rpm' };
        const alArr = points.map(p => p.altitude);
        if (alArr.some(v => v != null)) chartSeries.altitude = { label: t('activity_detail.tab_altitude'), data: alArr, color: '#d97706', unit: 'm' };

        let currentChartType = Object.keys(chartSeries)[0] || 'hr';
        let currentXAxis = 'time';
        let mainChart = null;

        function renderChart() {
            const s = chartSeries[currentChartType];
            if (!s) return;
            if (mainChart) mainChart.destroy();
            const isDist = currentXAxis === 'distance';
            const xTitle = isDist ? t('activity_detail.xaxis_distance') + ' (km)' : t('activity_detail.xaxis_time');
            let chartData, xScale;
            if (isDist) {
                // 按距离均匀重采样：将 trackpoint 数据插值到等距采样点上
                let maxDist = 0;
                for (const p of points) { if (p.distance != null && p.distance > maxDist) maxDist = p.distance; }
                if (maxDist > 0) {
                    const numBins = Math.min(points.length, 500);
                    chartData = [];
                    for (let i = 0; i <= numBins; i++) {
                        const targetDist = (i / numBins) * maxDist;
                        // 二分查找目标距离两侧的 trackpoint
                        let lo = 0, hi = points.length - 1;
                        while (lo < hi) { const mid = (lo + hi) >> 1; if (points[mid].distance == null || points[mid].distance < targetDist) lo = mid + 1; else hi = mid; }
                        if (lo === 0) {
                            chartData.push({ x: targetDist / 1000, y: s.data[0] ?? null });
                        } else {
                            const d0 = points[lo - 1].distance, d1 = points[lo].distance;
                            if (d0 == null || d1 == null || d1 === d0) {
                                chartData.push({ x: targetDist / 1000, y: s.data[lo] ?? null });
                            } else {
                                const frac = (targetDist - d0) / (d1 - d0);
                                const v0 = s.data[lo - 1], v1 = s.data[lo];
                                chartData.push({ x: targetDist / 1000, y: (v0 != null && v1 != null) ? v0 + frac * (v1 - v0) : v1 ?? v0 ?? null });
                            }
                        }
                    }
                } else { chartData = []; }
                xScale = { type: 'linear', display: true, title: { display: true, text: xTitle }, max: maxDist / 1000, ticks: { maxTicksLimit: 10 } };
            } else {
                chartData = { labels: timeLabels, datasets: [{ label: s.label, data: s.data, borderColor: s.color, fill: true, backgroundColor: s.color + '1a' }] };
                xScale = { display: true, ticks: { maxTicksLimit: 10 }, title: { display: true, text: xTitle } };
            }
            const dataset = isDist ? { label: s.label, data: chartData, borderColor: s.color, backgroundColor: s.color + '1a', showLine: true, pointRadius: 0, borderWidth: 1.5, fill: true } : chartData.datasets[0];
            const dataArg = isDist ? { datasets: [dataset] } : chartData;
            mainChart = new Chart(document.getElementById('main-chart'), {
                type: isDist ? 'scatter' : 'line',
                plugins: [crosshairPlugin],
                data: dataArg,
                options: { ...chartOpts, scales: { x: { ...chartOpts.scales.x, ...xScale }, y: { ...chartOpts.scales.y, title: { display: true, text: s.unit } } } },
            });
        }
        window.switchChart = function(type) {
            currentChartType = type;
            document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.chart-tab[onclick*="' + type + '"]')?.classList.add('active');
            renderChart();
        };
        window.switchXAxis = function(axis) {
            currentXAxis = axis;
            document.getElementById('xaxis-time').classList.toggle('active', axis === 'time');
            document.getElementById('xaxis-distance').classList.toggle('active', axis === 'distance');
            renderChart();
        };
        renderChart();
    }

    // 心率分区图
    if (m.hr_zones_time && Object.keys(m.hr_zones_time).length > 0) {
        const hrLabels = Object.keys(m.hr_zones_time);
        const hrValues = Object.values(m.hr_zones_time).map(v => (v / 60).toFixed(1));
        new Chart(document.getElementById('hr-zones-chart'), {
            type: 'bar',
            data: {
                labels: hrLabels,
                datasets: [{ label: t('activity_detail.xaxis_time') + '（' + t('time.min') + '）', data: hrValues, backgroundColor: ['#dbeafe', '#93c5fd', '#60a5fa', '#3b82f6', '#1d4ed8'] }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    // 功率分区图
    if (m.power_zones_time && Object.keys(m.power_zones_time).length > 0) {
        const pwLabels = Object.keys(m.power_zones_time);
        const pwValues = Object.values(m.power_zones_time).map(v => (v / 60).toFixed(1));
        new Chart(document.getElementById('power-zones-chart'), {
            type: 'bar',
            data: {
                labels: pwLabels,
                datasets: [{ label: t('activity_detail.xaxis_time') + '（' + t('time.min') + '）', data: pwValues, backgroundColor: ['#dcfce7', '#bbf7d0', '#86efac', '#4ade80', '#22c55e', '#16a34a', '#166534'] }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    // Power curve chart
    if (m.best_efforts && m.best_efforts.power && curveRes.data && curveRes.data.power) {
        const histCurve = curveRes.data.power;
        const actCurve = m.best_efforts.power;
        const allWindows = [...new Set([...Object.keys(histCurve), ...Object.keys(actCurve)])].sort((a,b) => parseInt(a)-parseInt(b));
        if (allWindows.length > 0) {
            const labels = allWindows.map(w => fmtDur(parseInt(w)));
            const histData = allWindows.map(w => histCurve[w] || null);
            const actData = allWindows.map(w => actCurve[w] || null);
            const el = document.getElementById('power-curve-chart');
            if (el) {
                new Chart(el, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            { label: t('activity_detail.historical_best'), data: histData, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.1)', fill: true, borderWidth: 2, pointRadius: 3 },
                            { label: t('activity_detail.this_activity'), data: actData, borderColor: '#f97316', backgroundColor: 'rgba(249,115,22,0.1)', fill: false, borderWidth: 2, pointRadius: 3, borderDash: [5,3] },
                        ]
                    },
                    options: {
                        responsive: true,
                        scales: { y: { beginAtZero: false, title: { display: true, text: t('activity_detail.power_legend') } } },
                        plugins: { legend: { position: 'bottom' } },
                        elements: { line: { tension: 0.3 } }
                    }
                });
            }
        }
    }
}).catch(err => {
    const errDiv = document.createElement('div');
    errDiv.className = 'card';
    errDiv.style.cssText = 'text-align:center;color:var(--text-secondary);padding:2rem;';
    errDiv.textContent = t('activity_detail.load_failed') + ': ' + err.message;
    const backLink = document.createElement('a');
    backLink.href = '/activities';
    backLink.className = 'btn btn-primary';
    backLink.style.marginTop = '1rem';
    backLink.textContent = t('activity_detail.back_to_list');
    errDiv.appendChild(document.createElement('br'));
    errDiv.appendChild(backLink);
    document.getElementById('activity-detail').innerHTML = '';
    document.getElementById('activity-detail').appendChild(errDiv);
});

function editActivity() {
    const a = window._activityData;
    if (!a) return;
    const overlay = document.createElement('div');
    overlay.id = 'edit-modal-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;';
    const typeOptions = Object.entries(typeNames).map(([k,v]) => `<option value="${k}" ${a.activity_type===k?'selected':''}>${v}</option>`).join('');
    overlay.innerHTML = `<div style="background:var(--card-bg);padding:1.5rem;border-radius:8px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;border:1px solid var(--border);">
        <h3 style="margin-bottom:1rem;">${t('activity_detail.edit')}</h3>
        <div class="form-group"><label>${t('activity_detail.edit_name_label')}</label><input type="text" id="edit-name" value="${(a.name||'').replace(/"/g,'&quot;')}" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;"></div>
        <div class="form-group"><label>${t('activity_detail.edit_type_label')}</label><select id="edit-type" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">${typeOptions}</select></div>
        <div class="form-group"><label>${t('activity_detail.edit_feel_label')}</label><textarea id="edit-notes" rows="4" style="width:100%;padding:0.5rem;border:1px solid var(--border);border-radius:6px;">${(a.notes||'').replace(/</g,'&lt;')}</textarea></div>
        <div style="display:flex;gap:0.5rem;margin-top:1rem;">
            <button class="btn btn-primary" onclick="saveEdit()">${t('activity_detail.save_btn')}</button>
            <button class="btn btn-secondary" onclick="closeEdit()">${t('activity_detail.cancel_btn')}</button>
        </div>
    </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) closeEdit(); });
    document.body.appendChild(overlay);
}

function closeEdit() {
    const m = document.getElementById('edit-modal-overlay');
    if (m) m.remove();
}

function saveEdit() {
    const name = document.getElementById('edit-name').value;
    const type = document.getElementById('edit-type').value;
    const notes = document.getElementById('edit-notes').value;
    authFetch(`/api/activities/${activityId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, activity_type: type, notes }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) location.reload();
            else showToast(res.message, 'error');
        });
}

function applySuggestedType(suggestedType) {
    authFetch(`/api/activities/${activityId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ activity_type: suggestedType }),
    })
        .then(r => r.json())
        .then(res => {
            if (res.code === 200) {
                showToast(t('activity_detail.type_fixed'), 'success');
                location.reload();
            } else {
                showToast(res.message, 'error');
            }
        });
}

function dismissSuggestion() {
    const el = document.getElementById('type-suggestion');
    if (el) el.remove();
}

function lapRow(lap) {
    const dur = lap.duration_seconds;
    const durStr = dur >= 3600 ? Math.floor(dur/3600) + ':' + String(Math.floor((dur%3600)/60)).padStart(2,'0') + ':' + String(Math.floor(dur%60)).padStart(2,'0')
        : Math.floor(dur/60) + ':' + String(Math.floor(dur%60)).padStart(2,'0');
    const distStr = lap.distance_meters ? (lap.distance_meters / 1000).toFixed(2) + ' km' : '—';
    const pace = lap.avg_speed_kmh ? (60 / lap.avg_speed_kmh).toFixed(0) + ':' + String(Math.floor((60 / lap.avg_speed_kmh % 1) * 60)).padStart(2,'0') + ' /km' : '—';
    const hr = lap.avg_hr ? lap.avg_hr + (lap.max_hr ? ' / ' + lap.max_hr : '') + ' bpm' : '—';
    const pw = lap.avg_power ? lap.avg_power + (lap.max_power ? ' / ' + lap.max_power : '') + ' W' : '—';
    const cad = lap.avg_cadence ? lap.avg_cadence + ' rpm' : '—';
    return `<tr style="border-bottom: 1px solid var(--border);">
        <td style="padding: 0.4rem 0.5rem; font-weight: 600;">${lap.lap}</td>
        <td style="padding: 0.4rem 0.5rem;">${durStr}</td>
        <td style="padding: 0.4rem 0.5rem;">${distStr}</td>
        <td style="padding: 0.4rem 0.5rem;">${pace}</td>
        <td style="padding: 0.4rem 0.5rem;">${hr}</td>
        <td style="padding: 0.4rem 0.5rem;">${pw}</td>
        <td style="padding: 0.4rem 0.5rem;">${cad}</td>
    </tr>`;
}

function switchLapMode(btn) {
    document.querySelectorAll('.lap-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn.style.background = 'var(--primary)';
    btn.style.color = 'white';
    document.querySelectorAll('.lap-mode-btn:not(.active)').forEach(b => { b.style.background = ''; b.style.color = ''; });

    const mode = btn.dataset.mode;
    const interval = btn.dataset.interval;
    authFetch(`/api/activities/${activityId}/laps?mode=${mode}&interval=${interval}`)
        .then(r => r.json())
        .then(res => {
            const body = document.getElementById('laps-body');
            if (res.data && res.data.length > 0) {
                body.innerHTML = res.data.map(lap => lapRow(lap)).join('');
            } else {
                body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);">' + t('activity_detail.insufficient_data') + '</td></tr>';
            }
        });
}

// TSS 手动编辑
const tssDisplay = document.getElementById('tss-display');
const tssEditor = document.getElementById('tss-editor');
if (tssDisplay) {
    tssDisplay.addEventListener('click', () => { tssEditor.style.display = 'block'; tssDisplay.style.cursor = 'default'; });
}
function cancelTssEdit() { tssEditor.style.display = 'none'; tssDisplay.style.cursor = 'pointer'; }
function saveTss() {
    const val = document.getElementById('tss-input').value;
    const num = val !== '' ? parseFloat(val) : null;
    if (val !== '' && isNaN(num)) { showToast(t('activity_detail.invalid_number'), 'error'); return; }
    authFetch('/api/activities/' + activityId, {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({manual_tss: num})
    }).then(r => r.json()).then(res => {
        if (res.code === 200) {
            showToast(t('activity_detail.tss_updated'), 'success');
            tssEditor.style.display = 'none';
            location.reload();
        } else { showToast(res.message, 'error'); }
    });
}
function clearTss() {
    authFetch('/api/activities/' + activityId, {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({manual_tss: null})
    }).then(r => r.json()).then(res => {
        if (res.code === 200) { location.reload(); } else { showToast(res.message, 'error'); }
    });
}
</script>
