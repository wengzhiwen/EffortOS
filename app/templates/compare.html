{% extends "base.html" %}

{% block title %}活动对比 - EffortOS{% endblock %}

{% block content %}
<h2 style="margin-bottom: 1rem;">活动对比</h2>

<div class="card" style="margin-bottom: 1rem;">
    <div class="grid grid-2" style="align-items: end;">
        <div class="form-group">
            <label>活动 A</label>
            <select id="select-a"><option value="">选择活动...</option></select>
        </div>
        <div class="form-group">
            <label>活动 B</label>
            <select id="select-b"><option value="">选择活动...</option></select>
        </div>
    </div>
    <button class="btn btn-primary" onclick="doCompare()">对比</button>
</div>

<div id="compare-result" style="display: none;">
    <div class="grid grid-2" style="margin-bottom: 1rem;">
        <div class="card" id="card-a"></div>
        <div class="card" id="card-b"></div>
    </div>

    <div class="card" style="margin-bottom: 1rem;">
        <div class="card-title">指标对比</div>
        <table id="compare-table" style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
            <thead><tr style="border-bottom: 2px solid var(--border);">
                <th style="text-align: left; padding: 0.4rem;">指标</th>
                <th style="text-align: right; padding: 0.4rem;">活动 A</th>
                <th style="text-align: right; padding: 0.4rem;">活动 B</th>
                <th style="padding: 0.4rem;">差值</th>
            </tr></thead>
            <tbody id="compare-body"></tbody>
        </table>
    </div>

    <div class="card" style="margin-bottom: 1rem;">
        <div class="card-title">心率曲线叠加</div>
        <canvas id="compare-hr" height="200"></canvas>
    </div>
    <div class="card" style="margin-bottom: 1rem;">
        <div class="card-title">功率曲线叠加</div>
        <canvas id="compare-power" height="200"></canvas>
    </div>
</div>
{% endblock %}

{% block script %}
<script>
const typeNames = window.TYPE_NAMES;

// 加载活动列表
authFetch('/api/activities?limit=50')
    .then(r => r.json())
    .then(res => {
        const items = res.data.items || [];
        const options = items.map(a => `<option value="${a.id}">${a.start_time.slice(0,10)} ${a.name || '(未命名)'} [${typeNames[a.activity_type] || a.activity_type}]</option>`).join('');
        document.getElementById('select-a').innerHTML += options;
        document.getElementById('select-b').innerHTML += options;
    });

function doCompare() {
    const idA = document.getElementById('select-a').value;
    const idB = document.getElementById('select-b').value;
    if (!idA || !idB) { showToast('请选择两个活动', 'error'); return; }
    if (idA === idB) { showToast('请选择不同的活动', 'error'); return; }

    authFetch(`/api/activities/compare?a=${idA}&b=${idB}`)
        .then(r => r.json())
        .then(res => {
            if (res.code !== 200) { showToast(res.message, 'error'); return; }
            const d = res.data;
            renderResult(d.a, d.b);
        });
}

let _compareCharts = [];

function renderResult(a, b) {
    // 销毁上一次对比的图表实例
    _compareCharts.forEach(c => c.destroy());
    _compareCharts = [];

    document.getElementById('compare-result').style.display = 'block';

    // 活动摘要卡片
    document.getElementById('card-a').innerHTML = summaryCard(a, '#2563eb');
    document.getElementById('card-b').innerHTML = summaryCard(b, '#dc2626');

    // 指标对比表
    const rows = [
        ['时长', fmtDur(a.summary?.duration_seconds), fmtDur(b.summary?.duration_seconds)],
        ['距离', fmtDist(a.summary?.total_distance), fmtDist(b.summary?.total_distance)],
        ['TSS', fmt(a.metrics?.tss), fmt(b.metrics?.tss)],
        ['IF', fmt(a.metrics?.intensity_factor), fmt(b.metrics?.intensity_factor)],
        ['NP', fmt(a.metrics?.normalized_power, 0, 'W'), fmt(b.metrics?.normalized_power, 0, 'W')],
        ['平均心率', fmt(a.summary?.avg_heart_rate, 0, 'bpm'), fmt(b.summary?.avg_heart_rate, 0, 'bpm')],
        ['平均功率', fmt(a.summary?.avg_power, 0, 'W'), fmt(b.summary?.avg_power, 0, 'W')],
        ['做功', fmt(a.metrics?.work_kj, 0, 'kJ'), fmt(b.metrics?.work_kj, 0, 'kJ')],
    ];

    document.getElementById('compare-body').innerHTML = rows.map(([name, va, vb]) => {
        const na = parseFloat(va) || 0;
        const nb = parseFloat(vb) || 0;
        const diff = na && nb ? (nb - na).toFixed(1) : '—';
        const color = diff === '—' ? '' : diff > 0 ? 'color: #16a34a' : diff < 0 ? 'color: #dc2626' : '';
        return `<tr style="border-bottom: 1px solid var(--border);">
            <td style="padding: 0.4rem;">${name}</td>
            <td style="text-align: right; padding: 0.4rem; font-weight: 600;">${va}</td>
            <td style="text-align: right; padding: 0.4rem; font-weight: 600;">${vb}</td>
            <td style="text-align: center; padding: 0.4rem; ${color}">${diff === '—' ? diff : (diff > 0 ? '+' : '') + diff}</td>
        </tr>`;
    }).join('');

    // 曲线叠加
    const labels = Array.from({length: 101}, (_, i) => i);
    const chartOpts = {
        responsive: true,
        scales: { x: { title: { display: true, text: '活动进度 %' } } },
        plugins: { legend: { position: 'bottom' } },
        elements: { point: { radius: 0 }, line: { borderWidth: 1.5 } },
    };

    const hrA = interpolateToPercent(a.trackpoints, 'hr');
    const hrB = interpolateToPercent(b.trackpoints, 'hr');
    if (hrA.some(v => v != null) || hrB.some(v => v != null)) {
        _compareCharts.push(new Chart(document.getElementById('compare-hr'), {
            type: 'line',
            data: { labels, datasets: [
                { label: a.name || 'A', data: hrA, borderColor: '#2563eb' },
                { label: b.name || 'B', data: hrB, borderColor: '#dc2626' },
            ]},
            options: { ...chartOpts, scales: { ...chartOpts.scales, y: { title: { display: true, text: 'bpm' } } } },
        });
    }

    const pwA = interpolateToPercent(a.trackpoints, 'power');
    const pwB = interpolateToPercent(b.trackpoints, 'power');
    if (pwA.some(v => v != null) || pwB.some(v => v != null)) {
        _compareCharts.push(new Chart(document.getElementById('compare-power'), {
            type: 'line',
            data: { labels, datasets: [
                { label: a.name || 'A', data: pwA, borderColor: '#2563eb' },
                { label: b.name || 'B', data: pwB, borderColor: '#dc2626' },
            ]},
            options: { ...chartOpts, scales: { ...chartOpts.scales, y: { title: { display: true, text: 'W' } } } },
        });
    }
}

function summaryCard(act, color) {
    const s = act.summary || {};
    const m = act.metrics || {};
    return `<div style="border-left: 4px solid ${color}; padding-left: 0.75rem;">
        <div style="font-weight: 600; font-size: 1.05rem;">${act.name || '未命名'}</div>
        <div style="font-size: 0.85rem; color: var(--text-secondary);">${typeNames[act.type] || act.type}</div>
        <div style="margin-top: 0.5rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; font-size: 0.9rem;">
            <div><div style="color: var(--text-secondary);">时长</div>${fmtDur(s.duration_seconds)}</div>
            <div><div style="color: var(--text-secondary);">距离</div>${fmtDist(s.total_distance)}</div>
            <div><div style="color: var(--text-secondary);">TSS</div>${m.tss != null ? m.tss.toFixed(1) : '—'}</div>
        </div>
    </div>`;
}

function interpolateToPercent(tps, field) {
    if (!tps || tps.length === 0) return [];
    const result = new Array(101).fill(null);
    for (const tp of tps) {
        const idx = Math.round(tp.percent);
        if (idx >= 0 && idx <= 100) result[idx] = tp[field];
    }
    // 线性插值填补空缺
    for (let i = 1; i <= 100; i++) {
        if (result[i] === null && result[i-1] !== null) result[i] = result[i-1];
    }
    return result;
}

function fmt(v, dec, unit) { return v != null ? (dec != null ? v.toFixed(dec) : v) + (unit ? ' ' + unit : '') : '—'; }
function fmtDur(s) { return s ? Math.floor(s/60) + '分' : '—'; }
function fmtDist(m) { return m ? (m/1000).toFixed(1) + ' km' : '—'; }
</script>
{% endblock %}
